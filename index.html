                        after: filesData.after.map(f => ({ url: f.url, posX: f.posX || 50, posY: f.posY || 50 }))
                    };
                    const newPost = { id: Date.now(), category: category || '준공-청소', title: formData.title, content: formData.content, date: new Date().toLocaleDateString('ko-KR'), img: filesData.main ? filesData.main.url : fallbackImg, detail: detailImgs };
                    const updated = [newPost, ...allPosts];
                    await saveAll(updated);
                    setIsModalOpen(false);
                    setFilesData({ main: null, before: [], during: [], after: [] });
                    setFormData({ title: '', content: '' });
                } catch (err) {
                    alert('저장 실패: 이미지 용량이 너무 큽니다. 이미지 수를 줄여주세요.');
                } finally {
                    setIsUploading(false);
                }
            };

            const handleDeletePost = async (id) => {
                if (!window.confirm('정말로 이 포트폴리오를 삭제하시겠습니까?')) return;
                const updated = allPosts.filter(p => p.id !== id);
                await saveAll(updated);
                setActiveIndex(0);
            };

            return (
                <div className="pt-28 pb-32 min-h-screen bg-gray-50 font-sans animate-in fade-in slide-in-from-bottom-12 duration-[1500ms] ease-out">

                    {/* 메인 콘텐츠 영역 */}
                    <div className="max-w-7xl mx-auto px-6">
                        {/* '대문으로 돌아가기' 버튼: Sticky 위치 조정 및 텍스트 줄바꿈 방지 */}
                        <div className="sticky top-28 z-[90] mb-8 animate-in slide-in-from-left-5 duration-700">
                            <button
                                onClick={onBack}
                                className="group inline-flex items-center bg-[#10b981] text-white p-2.5 pr-6 rounded-full shadow-[0_10px_25px_rgba(16,185,129,0.2)] hover:bg-[#065f46] transition-all transform hover:scale-105 active:scale-95"
                            >
                                <div className="w-10 h-10 bg-white text-[#10b981] rounded-full flex items-center justify-center transition-colors shadow-sm">
                                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                </div>
                                <span className="ml-4 font-black transition-colors uppercase tracking-tight text-xs md:text-base whitespace-nowrap">
                                    대문으로 돌아가기
                                </span>
                            </button>
                        </div>

                        <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-12">
                            <div>
                                <div className="w-16 h-1.5 bg-[#10b981] rounded-full mb-6"></div>
                                <h1 className="text-4xl md:text-5xl font-black text-gray-900 mb-4 tracking-tight">
                                    {readableCategory} 현황
                                </h1>
                                <p className="text-lg text-gray-400 font-medium">현장 관리 데이터를 번호별로 탐색하세요.</p>
                            </div>
                            {isAdmin && (
                                <button onClick={() => setIsModalOpen(true)} className="mt-8 md:mt-0 inline-flex items-center justify-center px-8 py-4 bg-gray-900 text-white rounded-xl font-bold shadow-xl hover:bg-[#10b981] transition-transform transform hover:-translate-y-1 duration-300">
                                    <svg className="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4" /></svg>
                                    새 갤러리 업로드
                                </button>
                            )}
                        </div>

                        {isDataLoaded && posts.length > 0 && activePost ? (
                            <div className="bg-white rounded-[2.5rem] shadow-[0_12px_40px_rgb(0,0,0,0.06)] border border-gray-100 overflow-hidden flex flex-col lg:flex-row h-auto lg:min-h-[650px] relative group animate-in fade-in zoom-in-95 duration-500">


                                {/* 왼쪽 이미지 영역 */}
                                <div className={`w-full lg:w-[60%] min-h-[400px] lg:h-auto relative overflow-hidden bg-gray-900 flex-shrink-0 group/slider cursor-pointer`} 
                                    onClick={nextImage}>
                                    <div
                                        className="absolute inset-0 w-full h-full transition-all duration-1000 group-hover/slider:scale-[1.05]"
                                        style={{
                                            backgroundImage: `url(${activeImg ? activeImg.url : activePost.img})`,
                                            backgroundSize: 'cover',
                                            backgroundPosition: `${activeImg?.posX || 50}% ${activeImg?.posY || 50}%`
                                        }}
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover/slider:opacity-100 transition-opacity"></div>

                                    {stageSequence.length > 1 && (
                                        <div className="absolute top-6 left-6 z-30 pointer-events-none">
                                            <div className="bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 flex items-center gap-2 shadow-lg">
                                                <div className="w-1.5 h-1.5 bg-[#10b981] rounded-full animate-pulse"></div>
                                                <span className="text-white font-black text-[10px] md:text-xs uppercase tracking-tighter">
                                                    {stage === 'before' ? '작업 전' : stage === 'during' ? '작업 중' : '작업 후'} 
                                                    {currentDetailImages.length > 1 && ` (${imgIndex + 1}/${currentDetailImages.length})`}
                                                </span>
                                            </div>
                                        </div>
                                    )}


                                    {stageSequence.length > 1 && (
                                         <React.Fragment>
                                             <button onClick={prevImage} className="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 hover:bg-[#10b981] text-white rounded-full flex items-center justify-center backdrop-blur-md opacity-0 group-hover/slider:opacity-100 transition-all z-40">
                                                 <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg>
                                             </button>
                                             <button onClick={nextImage} className="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 hover:bg-[#10b981] text-white rounded-full flex items-center justify-center backdrop-blur-md opacity-0 group-hover/slider:opacity-100 transition-all z-40">
                                                 <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7" /></svg>
                                             </button>
                                         </React.Fragment>
                                     )}
                                </div>

                                {/* 오른쪽 정보 패널 */}
                                <div className="w-full lg:w-[40%] flex flex-col bg-white relative">
                                    <div className="p-10 lg:p-12 flex-grow overflow-y-auto custom-scrollbar active-info-scroll border-b border-gray-50">
                                        
                                        <div className="flex justify-between items-center mb-8 sticky top-0 bg-white/95 backdrop-blur-sm z-30 py-2 -mx-4 px-4">
                                            <span className="bg-gray-100 text-gray-500 font-extrabold text-[10px] px-3 py-1 rounded-md tracking-widest uppercase">
                                                DETAILED REPORT
                                            </span>
                                            <div className="flex items-center gap-2">
                                                <span className="w-2 h-2 bg-[#10b981] rounded-full animate-pulse"></span>
                                                <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Active Insight</span>
                                            </div>
                                        </div>

                                        <div className="flex bg-gray-50 p-1.5 rounded-2xl mb-8 sticky top-[60px] z-20 shadow-sm border border-gray-100">
                                            {['before', 'during', 'after'].map(s => (
                                                <button key={s} onClick={() => { setStage(s); setImgIndex(0); }} className={`flex-1 py-3.5 rounded-xl font-black text-[13px] transition-all transform duration-300 ${stage === s ? 'bg-[#10b981] text-white shadow-lg scale-[1.02]' : 'text-gray-400 hover:text-gray-600 active:scale-95'}`}>
                                                    {s === 'before' ? '작업 전' : s === 'during' ? '작업 중' : '작업 후'}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="flex items-center justify-between mb-4">
                                            <span className="text-[11px] font-black text-[#10b981] tracking-[0.3em] uppercase opacity-70">SUCCESS STORY</span>
                                            <span className="text-[11px] font-bold text-gray-400 uppercase tracking-widest">{activePost.date}</span>
                                        </div>

                                        <h2 className="text-3xl lg:text-4xl font-black text-gray-900 mb-8 leading-[1.2] break-keep">{activePost.title}</h2>
                                        <div className="w-16 h-1.5 bg-[#10b981] mb-10 rounded-full"></div>
                                        
                                        <div className="prose prose-sm lg:prose-base text-gray-500 font-bold leading-relaxed whitespace-pre-wrap break-keep active-content-area transition-all duration-700 opacity-100 translate-y-0">
                                            {activePost.content}
                                        </div>


                                        {isAdmin && (
                                            <div className="mt-12 pt-8 border-t border-gray-100 flex gap-4">
                                                <button onClick={() => handleDeletePost(activePost.id)} className="px-6 py-3 border-2 border-red-50 text-red-400 rounded-xl text-xs font-black hover:bg-red-50 transition-all flex items-center gap-2">
                                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                    데이터 영구 삭제
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* 하단 썸네일 리스트 */}
                                    <div className="h-40 lg:h-44 bg-gray-50/50 p-6 flex space-x-5 items-center overflow-x-auto custom-scrollbar border-t border-gray-100">
                                        {posts.map((post, idx) => (
                                            <button key={post.id} onClick={() => { setActiveIndex(idx); setStage('after'); setImgIndex(0); }} className={`relative w-28 h-28 lg:w-32 lg:h-32 flex-shrink-0 rounded-2xl overflow-hidden transition-all duration-500 transform hover:translate-y-[-4px] ${activeIndex === idx ? 'ring-[6px] ring-[#10b981] ring-offset-2 scale-105 z-10 shadow-2xl' : 'opacity-40 grayscale-[0.5] hover:opacity-100 hover:grayscale-0'}`}>
                                                <img src={post.img} className="w-full h-full object-cover" alt={`Case-${idx+1}`} />
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                                                <div className="absolute bottom-2 right-2 w-8 h-8 bg-[#10b981] text-white flex items-center justify-center rounded-full text-[13px] font-black shadow-lg ring-2 ring-white animate-bounce-slow">{idx + 1}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="py-48 flex flex-col items-center justify-center text-gray-300 bg-white rounded-[3rem] border-2 border-dashed border-gray-100 animate-luxury-fade">
                                <div className="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mb-6">
                                    <svg className="w-12 h-12 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                                </div>
                                <p className="text-xl font-black text-gray-400 tracking-tight">작성된 현장 기록이 없습니다.</p>
                                <p className="text-sm font-bold text-gray-300 mt-2">첫 번째 성공 사례를 등록해 보세요.</p>
                            </div>
                        )}

                        {/* 관리자 업로드 모달 (완벽하게 분리된 위치) */}
                        {isModalOpen && (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-xl z-[9999] flex items-center justify-center p-4 md:p-8 overflow-y-auto" onClick={(e) => e.target === e.currentTarget && setIsModalOpen(false)}>
                                <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scrollbar relative animate-luxury-fade pointer-events-auto">
                                    <button onClick={() => setIsModalOpen(false)} className="absolute top-8 right-8 w-12 h-12 flex items-center justify-center rounded-xl bg-gray-100 text-gray-400 hover:text-gray-900 hover:bg-gray-100 transition-all z-50 group">
                                        <svg className="w-6 h-6 transform group-hover:rotate-90 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>

                                    <form onSubmit={handleUpload} className="p-8 md:p-12 space-y-10">
                                        <div className="text-center pt-4">
                                            <span className="text-[11px] font-black text-[#10b981] tracking-[0.4em] uppercase mb-4 block">New Portfolio</span>
                                            <h2 className="text-3xl md:text-4xl font-black text-gray-900 tracking-tight">현장 갤러리 등록</h2>
                                        </div>

                                        <div className="space-y-6">
                                            <div>
                                                <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 block ml-1">현장 명칭</label>
                                                <input type="text" value={formData.title} onChange={e => setFormData(p => ({ ...p, title: e.target.value }))} placeholder="예: [준공 청소] 강남구 논현동 프리미엄 아파트" required className="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:bg-white focus:border-[#10b981] font-bold text-gray-900 outline-none transition-all placeholder-gray-300 shadow-inner" />
                                            </div>
                                            <div>
                                                <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 block ml-1">작업 상세 내용</label>
                                                <textarea value={formData.content} onChange={e => setFormData(p => ({ ...p, content: e.target.value }))} placeholder="현장 특징, 적용된 공법, 고객 피드백 등을 상세히 작성해 주세요." rows="5" className="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:bg-white focus:border-[#10b981] font-bold text-gray-900 outline-none transition-all placeholder-gray-300 shadow-inner leading-relaxed" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-1 block ml-1">대표 이미지</label>
                                                <div className="relative group/main">
                                                    {filesData.main ? (
                                                        <div className="relative w-full h-48 rounded-2xl overflow-hidden shadow-lg">
                                                            <img src={filesData.main.url} className="w-full h-full object-cover" alt="Main" />
                                                            <button type="button" onClick={() => setFilesData(p => ({ ...p, main: null }))} className="absolute top-4 right-4 w-8 h-8 bg-black/50 text-white rounded-xl flex items-center justify-center hover:bg-red-500 transition-all backdrop-blur-md shadow-xl"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" /></svg></button>
                                                        </div>
                                                    ) : (
                                                        <label className="w-full h-48 flex flex-col items-center justify-center border-4 border-dashed border-gray-100 rounded-[2rem] bg-gray-50 hover:bg-[#ecfdf5] hover:border-[#10b981] transition-all cursor-pointer group/label">
                                                            <input type="file" accept="image/*" className="hidden" onChange={e => handleFileChange(e, 'main')} />
                                                            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-4 group-hover/label:scale-110 transition-transform"><svg className="w-8 h-8 text-[#10b981]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg></div>
                                                            <span className="text-[13px] font-black text-gray-400 group-hover/label:text-[#10b981]">대표 사진 (필수)</span>
                                                        </label>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="space-y-6">
                                                {['before', 'during', 'after'].map(stg => (
                                                    <div key={stg} className="space-y-3">
                                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] flex items-center gap-2">
                                                            {stg === 'before' ? '작업 전' : stg === 'during' ? '작업 중' : '작업 후'}
                                                            <span className="text-[#10b981] font-black">{filesData[stg].length}</span>
                                                        </label>
                                                        <div className="flex flex-wrap gap-2">
                                                            {filesData[stg].map((f, idx) => (
                                                                <div key={idx} className="relative w-16 h-16 rounded-xl overflow-hidden shadow-sm group/thumb">
                                                                    <img src={f.url} className="w-full h-full object-cover" alt="thumb" />
                                                                    <button type="button" onClick={() => setFilesData(p => ({ ...p, [stg]: p[stg].filter((_, i) => i !== idx) }))} className="absolute inset-0 bg-red-500/80 text-white flex items-center justify-center opacity-0 group-hover/thumb:opacity-100 transition-opacity"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                                                                </div>
                                                            ))}
                                                            <label className="w-16 h-16 flex items-center justify-center border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 hover:bg-[#ecfdf5] hover:border-[#10b981] transition-all cursor-pointer">
                                                                <input type="file" accept="image/*" multiple className="hidden" onChange={e => handleFileChange(e, stg)} />
                                                                <svg className="w-5 h-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 4v16m8-8H4" /></svg>
                                                            </label>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="pt-6">
                                            <button type="submit" disabled={isUploading || !formData.title.trim() || !filesData.main} className="w-full py-5 rounded-[1.5rem] bg-[#065f46] text-white font-black text-base shadow-2xl hover:bg-[#10b981] hover:scale-[1.02] transform transition-all active:scale-[0.98] disabled:opacity-30 disabled:grayscale disabled:cursor-not-allowed flex items-center justify-center gap-3">
                                                {isUploading ? (
                                                    <React.Fragment>
                                                        <svg className="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" /></svg>
                                                        서버에 고화질 이미지 저장 중...
                                                    </React.Fragment>
                                                ) : (
                                                    <React.Fragment>
                                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                                                        포트폴리오 발행하기
                                                    </React.Fragment>
                                                )}
                                            </button>
                                            <p className="text-center text-[11px] text-gray-400 mt-6 font-bold uppercase tracking-widest opacity-60">High performance storage powered by IndexedDB & REST API</p>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const AdminLoginModal = ({ onClose, onSuccess }) => {
            const [pw, setPw] = React.useState('');
            const [error, setError] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => {
                    if (pw === getAdminPassword()) {
                        sessionStorage.setItem('wellservice_admin', 'true');
                        onSuccess();
                    } else {
                        setError(true);
                        setLoading(false);
                        setPw('');
                    }
                }, 400);
            };
            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[99999] flex items-center justify-center p-4" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 relative animate-luxury-fade">
                        <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:text-gray-700 transition-colors">
                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-[#065f46] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                                <svg className="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <p className="text-[#10b981] font-black text-[10px] tracking-[0.4em] uppercase mb-2">Administrator</p>
                            <h3 className="text-2xl font-black text-gray-900 tracking-tight">관리자 로그인</h3>
                            <p className="text-gray-400 text-sm mt-1.5 font-medium">관리자 비밀번호를 입력하세요.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <input type="password" value={pw} onChange={(e) => { setPw(e.target.value); setError(false); }} placeholder="비밀번호" autoFocus
                                    className={`w-full px-4 py-3.5 rounded-xl border-2 text-sm font-medium focus:outline-none transition-all ${error ? 'border-red-300 bg-red-50 placeholder-red-300' : 'border-gray-200 focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10'}`}
                                />
                                {error && (
                                    <p className="flex items-center gap-1.5 text-red-400 text-xs font-bold mt-2">
                                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                        비밀번호가 올바르지 않습니다.
                                    </p>
                                )}
                            </div>
                            <button type="submit" disabled={loading || !pw}
                                className="w-full py-3.5 rounded-xl bg-[#065f46] text-white font-black text-sm shadow-lg hover:bg-[#10b981] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                            >
                                {loading ? (
                                    <React.Fragment>
                                        <svg className="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" /></svg>
                                        확인 중...
                                    </React.Fragment>
                                ) : '관리자 모드 접속'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const AdminSettingsModal = ({ onClose, onLogout, bizInfo, setBizInfo }) => {
            const [mode, setMode] = useState('menu'); // 'menu' | 'change_password' | 'edit_biz'
            const [currentPw, setCurrentPw] = useState('');
            const [newPw, setNewPw] = useState('');
            const [confirmPw, setConfirmPw] = useState('');
            const [tempBiz, setTempBiz] = useState({ ...bizInfo });
            const [error, setError] = useState('');
            const [success, setSuccess] = useState(false);

            useEffect(() => {
                if (mode === 'edit_biz') setTempBiz({ ...bizInfo });
            }, [mode, bizInfo]);

            const handlePasswordChange = (e) => {
                e.preventDefault();
                setError('');
                if (currentPw !== getAdminPassword()) {
                    setError('현재 비밀번호가 일치하지 않습니다.');
                    return;
                }
                if (newPw.length < 4) {
                    setError('새 비밀번호는 4자리 이상이어야 합니다.');
                    return;
                }
                if (newPw !== confirmPw) {
                    setError('새 비밀번호와 확인이 일치하지 않습니다.');
                    return;
                }

                localStorage.setItem('wellservice_admin_pwd', newPw);
                setSuccess(true);
                setTimeout(() => { onClose(); }, 1500);
            };

            const handleBizSave = (e) => {
                e.preventDefault();
                setBizInfo(tempBiz);
                localStorage.setItem('wellservice_biz_info', JSON.stringify(tempBiz));
                setSuccess(true);
                setTimeout(() => { setMode('menu'); setSuccess(false); }, 1500);
            };

            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[99999] flex items-center justify-center p-4" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 relative animate-luxury-fade overflow-hidden">
                        <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:text-gray-700 transition-colors">
                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>

                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-[#065f46] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg text-white">
                                {mode === 'edit_biz' ? (
                                    <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                ) : (
                                    <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                )}
                            </div>
                            <h3 className="text-2xl font-black text-gray-900 tracking-tight">{mode === 'edit_biz' ? '사업장 정보' : '관리자 설정'}</h3>
                            <p className="text-gray-400 text-sm mt-1.5 font-medium">
                                {mode === 'menu' ? '원하시는 작업을 선택하세요.' : (mode === 'edit_biz' ? '정보를 수정하고 저장하세요.' : '새로운 비밀번호를 입력하세요.')}
                            </p>
                        </div>

                        {success ? (
                            <div className="text-center py-6 animate-luxury-fade">
                                <div className="text-[#10b981] mb-2"><svg className="w-12 h-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7" /></svg></div>
                                <p className="font-bold text-gray-900 text-lg">저장 완료</p>
                            </div>
                        ) : mode === 'menu' ? (
                            <div className="space-y-3 animate-luxury-fade">
                                <button onClick={() => setMode('edit_biz')} className="w-full py-4 rounded-xl border border-gray-200 text-gray-700 font-bold hover:bg-gray-50 transition-all flex items-center justify-between px-6">
                                    사업장 정보 수정
                                    <svg className="w-4 h-4 text-[#10b981]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                </button>
                                <button onClick={() => setMode('change_password')} className="w-full py-4 rounded-xl border border-gray-200 text-gray-700 font-bold hover:bg-gray-50 transition-all flex items-center justify-between px-6">
                                    비밀번호 변경
                                    <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>
                                </button>
                                <button onClick={onLogout} className="w-full py-4 rounded-xl bg-[#065f46] text-white font-black text-sm tracking-wide shadow-lg hover:bg-[#10b981] transition-all flex items-center justify-center gap-2">
                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                    안전하게 로그아웃
                                </button>
                            </div>
                        ) : mode === 'edit_biz' ? (
                            <form onSubmit={handleBizSave} className="space-y-4 animate-luxury-fade">
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">회사 주소</label>
                                        <textarea value={tempBiz.address} onChange={e => setTempBiz(p => ({ ...p, address: e.target.value }))} required rows="3" className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-xs font-bold focus:outline-none focus:bg-white focus:border-[#10b981] transition-all" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">대표 번호</label>
                                        <input type="text" value={tempBiz.phone} onChange={e => setTempBiz(p => ({ ...p, phone: e.target.value }))} required className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-xs font-bold focus:outline-none focus:bg-white focus:border-[#10b981] transition-all" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">대표자</label>
                                            <input type="text" value={tempBiz.ceo} onChange={e => setTempBiz(p => ({ ...p, ceo: e.target.value }))} required className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-xs font-bold focus:outline-none focus:bg-white focus:border-[#10b981] transition-all" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">사업자번호</label>
                                            <input type="text" value={tempBiz.bizNum} onChange={e => setTempBiz(p => ({ ...p, bizNum: e.target.value }))} required className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-xs font-bold focus:outline-none focus:bg-white focus:border-[#10b981] transition-all" />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-2 pt-2">
                                    <button type="button" onClick={() => setMode('menu')} className="w-1/3 py-3.5 rounded-xl border border-gray-200 text-gray-500 font-bold hover:bg-gray-50 transition-all text-sm">취소</button>
                                    <button type="submit" className="w-2/3 py-3.5 rounded-xl bg-[#065f46] text-white font-black text-sm tracking-wide shadow-lg hover:bg-[#10b981] transition-all">정보 저장하기</button>
                                </div>
                            </form>
                        ) : (
                            <form onSubmit={handlePasswordChange} className="space-y-4 animate-luxury-fade">
                                <div className="space-y-3">
                                    <input type="password" value={currentPw} onChange={e => setCurrentPw(e.target.value)} placeholder="현재 비밀번호" required className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-sm font-medium focus:outline-none focus:bg-white focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10 transition-all" />
                                    <input type="password" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="새 비밀번호" required minLength={4} className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-sm font-medium focus:outline-none focus:bg-white focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10 transition-all" />
                                    <input type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} placeholder="새 비밀번호 확인" required minLength={4} className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 text-sm font-medium focus:outline-none focus:bg-white focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10 transition-all" />
                                </div>
                                {error && <p className="text-red-500 text-xs font-bold text-center animate-pulse">{error}</p>}
                                <div className="flex gap-2 pt-2">
                                    <button type="button" onClick={() => setMode('menu')} className="w-1/3 py-3.5 rounded-xl border border-gray-200 text-gray-500 font-bold hover:bg-gray-50 transition-all text-sm">취소</button>
                                    <button type="submit" className="w-2/3 py-3.5 rounded-xl bg-[#065f46] text-white font-black text-sm tracking-wide shadow-lg hover:bg-[#10b981] transition-all">변경하기</button>
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [category, setCategory] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isAdmin, setIsAdmin] = useState(() => sessionStorage.getItem('wellservice_admin') === 'true');
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [showAdminSettings, setShowAdminSettings] = useState(false);

            // Business Information State (CEO/BizNum included as per plan)
            const [bizInfo, setBizInfo] = useState(() => {
                try {
                    const saved = localStorage.getItem('wellservice_biz_info');
                    return saved ? JSON.parse(saved) : {
                        address: '전북특별자치도 전주시 완산구\n고사평 3길 13-8 1층(서신동)',
                        phone: '1688-8740',
                        ceo: '김태헌',
                        bizNum: '203-15-67225'
                    };
                } catch {
                    return {
                        address: '전북특별자치도 전주시 완산구\n고사평 3길 13-8 1층(서신동)',
                        phone: '1688-8740',
                        ceo: '김태헌',
                        bizNum: '203-15-67225'
                    };
                }
            });

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, [page]); // Re-observe when page changes

            const handleAdminLogin = () => { setIsAdmin(true); setShowAdminLogin(false); };
            const handleAdminLogout = () => { setIsAdmin(false); sessionStorage.removeItem('wellservice_admin'); setShowAdminSettings(false); window.scrollTo(0, 0); };

            const navigateToBoard = (catId) => {
                setCategory(catId);
                setPage('board');
                setIsMenuOpen(false);
                window.scrollTo(0, 0);
            };

            const navigateToHome = (hash = '') => {
                setPage('home');
                setIsMenuOpen(false);
                if (hash) {
                    setTimeout(() => {
                        const el = document.getElementById(hash.replace('#', ''));
                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                } else {
                    window.scrollTo(0, 0);
                }
            };

            return (
                <div className="min-h-screen bg-white flex flex-col font-sans selection:bg-brand-green selection:text-white">
                    {/* 모바일 메뉴 오버레이: 헤더 외부에서 독립적으로 렌더링하여 backdrop-blur 스태킹 컨텍스트 버그 방지 */}
                    {showAdminLogin && <AdminLoginModal onClose={() => setShowAdminLogin(false)} onSuccess={handleAdminLogin} />}
                    {showAdminSettings && <AdminSettingsModal onClose={() => setShowAdminSettings(false)} onLogout={handleAdminLogout} bizInfo={bizInfo} setBizInfo={setBizInfo} />}
                    <MobileMenuOverlay isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} onNavigate={navigateToHome} bizInfo={bizInfo} />
                    <Header onNavigate={navigateToHome} isHome={page === 'home'} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} isAdmin={isAdmin} bizInfo={bizInfo} onAdminTrigger={() => {
                        if (isAdmin) {
                            setShowAdminSettings(true);
                        } else {
                            setShowAdminLogin(true);
                        }
                    }} />
                    <main className="flex-grow">
                        {page === 'home' ? (
                            <React.Fragment>
                                <Hero onNavigate={navigateToHome} />
                                <BrandStory />
                                <TheWellSystem8 isAdmin={isAdmin} />
                                <Services />
                                <PortfolioBoard onCategorySelect={navigateToBoard} />
                                <Reviews isAdmin={isAdmin} />
                                <QuoteForm />
                            </React.Fragment>
                        ) : (
                            <BoardPage category={category} onBack={() => navigateToHome('portfolio')} isAdmin={isAdmin} />
                        )}
                    </main>

                    <footer className="bg-[#080c14] pt-24 pb-12 text-center text-gray-500 border-t border-white/5 relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[1px] bg-gradient-to-r from-transparent via-[#10b981]/30 to-transparent"></div>
                        <div className="max-w-7xl mx-auto px-6 relative z-10">
                            {/* Brand Header */}
                            <div className="mb-16 flex flex-col items-center reveal">
                                <div className="mb-6 opacity-90 flex items-center justify-center group p-1">
                                    <div className="relative w-32 h-32 md:w-40 md:h-40 flex items-center justify-center p-6">
                                        <div className="absolute inset-0 bg-white/95 -skew-x-[15deg] rounded-lg shadow-[0_4px_20px_rgba(0,0,0,0.6)] transition-transform duration-1000 group-hover:scale-105 -z-10 border border-white/20"></div>
                                        <div className="absolute inset-0 bg-[#10b981]/20 blur-xl rounded-full scale-0 group-hover:scale-150 transition-transform duration-1000 z-0"></div>
                                        <img src="public/images/logo_transparent.png" alt="THE WELL SERVICE 로고" className="w-[100%] h-[100%] object-contain group-hover:scale-110 transition-transform duration-700 relative z-10 drop-shadow-sm" />
                                    </div>
                                </div>
                                <h4 className="text-white text-xl md:text-2xl font-black mb-3 tracking-tighter">THE WELL SERVICE</h4>
                                <p className="text-[10px] md:text-sm text-[#10b981] font-black tracking-widest uppercase opacity-80 mt-1">
                                    프리미엄 종합 청소 솔루션
                                </p>
                            </div>

                            {/* Main Business Info - Refined Layout */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8 mb-20 text-sm reveal reveal-delay-1">
                                <div className="space-y-4">
                                    <h5 className="text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-white/5 pb-2 mb-4 inline-block">Company Info</h5>
                                    <div className="flex flex-col items-center space-y-2">
                                        <div className="flex items-center gap-3">
                                            <span className="text-gray-600 font-bold text-[10px]">대표</span>
                                            <span className="text-gray-300 font-bold">{bizInfo.ceo}</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="text-gray-600 font-bold text-[10px]">사업자번호</span>
                                            <span className="text-gray-300 font-bold">{bizInfo.bizNum}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h5 className="text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-white/5 pb-2 mb-4 inline-block">Location</h5>
                                    <p className="text-gray-400 font-medium break-keep leading-relaxed max-w-[240px] mx-auto whitespace-pre-wrap">
                                        {bizInfo.address}
                                    </p>
                                </div>
                                <div className="space-y-4">
                                    <h5 className="text-gray-400 font-black text-[10px] uppercase tracking-widest border-b border-white/5 pb-2 mb-4 inline-block">Contact Center</h5>
                                    <a href={`tel:${bizInfo.phone.replace(/[^0-9]/g, '')}`} className="block text-3xl font-black text-[#10b981] hover:text-white transition-all transform hover:scale-105 duration-300 tracking-tighter">
                                        {bizInfo.phone}
                                    </a>
                                    <p className="text-[10px] text-gray-600 font-bold">평일 09:00 - 18:00</p>
                                </div>
                            </div>

                            {/* Legal & Copyright */}
                            <div className="pt-12 border-t border-white/5 flex flex-col items-center space-y-6 reveal reveal-delay-2">
                                <div className="flex items-center gap-6">
                                    <span className="text-[10px] text-gray-500 cursor-pointer hover:text-white transition-colors tracking-widest uppercase font-bold">Terms of Service</span>
                                    <span className="text-[10px] text-gray-400 cursor-pointer hover:text-[#10b981] transition-colors tracking-widest uppercase font-bold">Privacy Policy</span>
                                </div>
                                <p className="text-[9px] md:text-[10px] text-gray-700 font-bold tracking-[0.2em] uppercase">
                                    &copy; {new Date().getFullYear()} THE WELL SERVICE. ALL RIGHTS RESERVED.
                                </p>
                            </div>
                        </div>
                    </footer>

                    {page === 'home' && <QuickMenu onNavigate={navigateToHome} bizInfo={bizInfo} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
