                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">비밀번호 (4자리) *</label>
                                            <input type="password" value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} required={!editingId} maxLength="4" placeholder="비밀번호 4자리" className="w-full px-4 py-3.5 rounded-xl border border-gray-100 bg-gray-50/50 text-sm font-bold focus:outline-none focus:bg-white focus:border-[#10b981] focus:ring-4 focus:ring-[#10b981]/5 transition-all" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">후기 내용 *</label>
                                            <textarea value={form.text} onChange={e => setForm(f => ({ ...f, text: e.target.value }))} required rows="5" placeholder="서비스에 대한 솔직한 평가를 남겨주세요." className="w-full px-4 py-3.5 rounded-xl border border-gray-100 bg-gray-50/50 text-sm font-medium focus:outline-none focus:bg-white focus:border-[#10b981] focus:ring-4 focus:ring-[#10b981]/5 transition-all resize-none leading-relaxed" />
                                        </div>
                                        <button type="submit" className="w-full py-4.5 rounded-xl bg-[#065f46] text-white font-black text-sm tracking-widest shadow-xl shadow-[#065f46]/20 hover:translate-y-[-2px] hover:shadow-[#065f46]/30 transition-all duration-300 mt-2">
                                            {editingId ? '저장 후 수정 완료' : '솔직한 후기 등록하기'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Password Prompt Modal */}
                    {promptState.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[120] flex items-center justify-center p-4" onClick={(e) => { if (e.target === e.currentTarget) setPromptState({ show: false, action: null, review: null, pin: '', error: '' }); }}>
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 relative overflow-hidden animate-luxury-fade">
                                <div className="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
                                <button onClick={() => setPromptState({ show: false, action: null, review: null, pin: '', error: '' })} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-gray-700 transition-colors">
                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                                <div className="text-center mb-6 pt-2">
                                    <h3 className="text-xl font-black text-gray-900">{promptState.action === 'edit' ? '본인 확인' : (promptState.action === 'admin_delete' ? '관리자 삭제' : '삭제 확인')}</h3>
                                    <p className="text-gray-400 text-xs font-bold mt-2">작성 시 입력한 비밀번호 4자리를 입력해주세요.</p>
                                </div>
                                <form onSubmit={handlePromptSubmit} className="space-y-4">
                                    {promptState.error && <p className="text-red-500 text-[11px] font-black text-center bg-red-50 py-2 rounded-lg">{promptState.error}</p>}
                                    {promptState.action !== 'admin_delete' && (
                                        <input type="password" value={promptState.pin} onChange={e => setPromptState(prev => ({ ...prev, pin: e.target.value, error: '' }))} autoFocus required maxLength="4" placeholder="••••" className="w-full px-4 py-4 rounded-xl border border-gray-100 bg-gray-50 text-center tracking-[1em] text-xl font-black focus:outline-none focus:bg-white focus:border-gray-900 transition-all" />
                                    )}
                                    <button type="submit" disabled={promptState.action !== 'admin_delete' && !promptState.pin} className={`w-full py-4 rounded-xl text-white font-black text-sm tracking-widest shadow-lg transition-all ${promptState.action === 'edit' ? 'bg-[#065f46] shadow-[#065f46]/20' : 'bg-red-500 shadow-red-500/20'}`}>{promptState.action === 'edit' ? '확인 완료' : '영구 삭제'}</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {/* Lookup Modal */}
                    {showLookup && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[110] flex items-center justify-center p-4" onClick={() => setShowLookup(false)}>
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm p-8 relative animate-luxury-fade overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-0 left-0 w-full h-1 bg-[#10b981]"></div>
                                <button onClick={() => setShowLookup(false)} className="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-gray-700 transition-colors">
                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-[#ecfdf5] rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#10b981] shadow-sm">
                                        <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                    </div>
                                    <h3 className="text-xl font-black text-gray-900">내 후기 찾기</h3>
                                    <p className="text-gray-400 text-[11px] font-bold mt-2 uppercase tracking-widest">Name & Password Lookup</p>
                                </div>
                                <form onSubmit={handleLookup} className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">이름 *</label>
                                        <input type="text" value={lookupForm.name} onChange={e => setLookupForm(f => ({ ...f, name: e.target.value, error: '' }))} className="w-full px-4 py-4 rounded-xl bg-gray-50 border border-gray-100 focus:outline-none focus:ring-4 focus:ring-[#10b981]/5 focus:bg-white focus:border-[#10b981] text-sm font-bold transition-all" placeholder="작성 시 입력한 성함" required />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">비밀번호 *</label>
                                        <input type="password" maxLength="4" value={lookupForm.password} onChange={e => setLookupForm(f => ({ ...f, password: e.target.value.replace(/\D/g, ''), error: '' }))} className="w-full px-4 py-4 rounded-xl bg-gray-50 border border-gray-100 focus:outline-none focus:ring-4 focus:ring-[#10b981]/5 focus:bg-white focus:border-[#10b981] text-center tracking-[1em] text-xl font-black transition-all" placeholder="••••" required />
                                    </div>
                                    {lookupForm.error && <p className="text-red-500 text-[11px] font-black text-center bg-red-50 py-2 rounded-lg animate-bounce">{lookupForm.error}</p>}
                                    <button type="submit" className="w-full py-4.5 rounded-xl bg-[#065f46] text-white font-black text-sm tracking-widest shadow-xl shadow-[#065f46]/20 hover:translate-y-[-2px] transition-all duration-300 mt-2">찾기 완료</button>
                                </form>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        const TheWellSystem8 = ({ isAdmin }) => {
            const [activeIdx, setActiveIdx] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [uploadingIdx, setUploadingIdx] = useState(null);
            const [toast, setToast] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => { if (!isAdmin) setEditMode(false); }, [isAdmin]);

            const defaultImages = [
                'public/images/step_1_custom.png?t=' + Date.now(), // STEP 01
                'public/images/step_2_custom.png?t=' + Date.now(), // STEP 02
                'public/images/step_3_custom.png?t=' + Date.now(), // STEP 03
                'public/images/step_4_custom.png?t=' + Date.now(), // STEP 04
                'public/images/step_5_custom.png?t=' + Date.now(), // STEP 05
                'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=800', // STEP 06 (Quota fallback)
                'https://images.unsplash.com/photo-1628177142898-93e36e4e3a50?auto=format&fit=crop&q=80&w=800', // STEP 07 (Quota fallback)
                'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&q=80&w=800', // STEP 08 (Quota fallback)
            ];

            const [stepImages, setStepImages] = useState(() => {
                try {
                    const saved = localStorage.getItem('wellservice_step8_images_v3');
                    const parsed = saved ? JSON.parse(saved) : null;
                    return parsed || [...defaultImages];
                } catch { return [...defaultImages]; }
            });

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 2500);
            };

            const handleEditClick = (e, idx) => {
                e.stopPropagation();
                setUploadingIdx(idx);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                    fileInputRef.current.click();
                }
            };

            // Compress and convert a file to Base64 (shared utility logic)
            const compressSystemImage = (file, maxSize = 1000) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let { width, height } = img;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
                            else { width = Math.round(width * maxSize / height); height = maxSize; }
                        }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            const handleFileChange = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file || uploadingIdx === null) return;

                showToast('이미지 최적화 중...', 'info');
                try {
                    const base64 = await compressSystemImage(file);
                    const updated = [...stepImages];
                    updated[uploadingIdx] = base64;
                    setStepImages(updated);
                    localStorage.setItem('wellservice_step8_images_v2', JSON.stringify(updated));
                    showToast(`STEP ${String(uploadingIdx + 1).padStart(2, '0')} 이미지가 변경되었습니다.`);
                } catch (err) {
                    showToast('이미지 저장 중 오류가 발생했습니다.', 'error');
                } finally {
                    setUploadingIdx(null);
                }
            };

            const handleReset = (e, idx) => {
                e.stopPropagation();
                if (!window.confirm('이 단계의 이미지를 기본값으로 되돌리시겠습니까?')) return;
                const updated = [...stepImages];
                updated[idx] = defaultImages[idx];
                setStepImages(updated);
                try { localStorage.setItem('wellservice_step8_images_v2', JSON.stringify(updated)); } catch { }
                showToast(`STEP ${String(idx + 1).padStart(2, '0')} 이미지가 초기화되었습니다.`);
            };

            const handleResetAll = () => {
                if (!window.confirm('모든 단계의 이미지를 기본값으로 되돌리시겠습니까?')) return;
                setStepImages([...defaultImages]);
                localStorage.removeItem('wellservice_step8_images_v2');
                showToast('모든 이미지가 초기화되었습니다.');
            };

            const toggleStep = (idx) => {
                if (editMode) return;
                setActiveIdx(activeIdx === idx ? null : idx);
            };

            const steps = [
                { num: '01', title: '현장 정밀 진단', subtitle: 'Field Analysis', desc: '작업 전 건자재의 종류와 오염원의 성질(산성, 알칼리성 등)을 분석합니다.', icon: <React.Fragment><path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><path d="M10 7V10L12 12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></React.Fragment> },
                { num: '02', title: '보양 및 안전 설계', subtitle: 'Safety Setting', desc: '고가 가전이나 손상 위험 시설물을 보양하고, 로프 등 안전 라인을 구축합니다.', icon: <React.Fragment><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><path d="M9 12L11 14L15 10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></React.Fragment> },
                { num: '03', title: '산업용 고성능 집진', subtitle: 'High-Power Vacuuming', desc: '공사 분진이나 고착된 먼지를 산업용 청소기로 선제거하여 2차 오염을 방지합니다.', icon: <React.Fragment><path d="M8 4H16M8 8H16M12 12V20M12 20H8M12 20H16" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><path d="M4 14C4 10.6863 6.68629 8 10 8H14C17.3137 8 20 10.6863 20 14V20H4V14Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></React.Fragment> },
                { num: '04', title: '맞춤형 세정 반응', subtitle: 'Chemical Reaction', desc: '자재 손상 없는 세정제를 최적 비율로 희석 도포하여 오염을 불려냅니다.', icon: <React.Fragment><path d="M9 3H15M12 3V10l4.636 8.03A2 2 0 0114.904 21H9.096a2 2 0 01-1.732-3.04L12 10z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><path d="M8 15h8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></React.Fragment> },
                { num: '05', title: '정밀 기계 세척', subtitle: 'Power Scrubbing', desc: '특수 장비(마루 광택기, 고압 세척기 등)를 투입하여 불려진 오염을 제거합니다.', icon: <React.Fragment><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.5" strokeDasharray="3 3" /><path d="M12 8v8M8 12h8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.5" /></React.Fragment> },
                { num: '06', title: 'pH 중화 및 린싱', subtitle: 'Neutralizing & Rinsing', desc: <span>세정제 성분이 남지 않도록 완벽히 중화하고 깨끗한 린싱으로 자재 본연의 질감을 복원하는 공정입니다.</span>, icon: <React.Fragment><path d="M12 3C12 3 5 8 5 14C5 17.866 8.13401 21 12 21C15.866 21 19 17.866 19 14C19 8 12 3 12 3Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /><path d="M10 15C10 15 11.5 17 14 14" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></React.Fragment> },
                { num: '07', title: '표면 보호 및 코팅', subtitle: 'Protective Coating', desc: '오염 방지 및 정전기 방지 코팅을 적용하여 쾌적한 청결 상태가 오랜 기간 유지되게 합니다.', icon: <path d="M12 3l2.8 6.4 6.2.5-4.8 4 1.5 6.1L12 16.5l-5.7 3.5 1.5-6.1-4.8-4 6.2-.5L12 3z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /> },
                { num: '08', title: '작업 완료 보고서 제출', subtitle: 'Final Inspection & Report', desc: <span>팀장급 관리자 검수 후, 시공 전후 공정 데이터를 정리한 프리미엄 리포트를 제공합니다.</span>, icon: <React.Fragment><rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /><path d="M9 8h6M9 12h6M9 16h3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /><path d="M15 16l2 2 4-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></React.Fragment> }
            ];

            return (
                <section className="py-16 md:py-24 bg-[#F8F9FA] relative reveal">
                    {/* Hidden file input */}
                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleFileChange} />

                    {/* Toast Notification */}
                    {toast && (
                        <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-[99999] flex items-center gap-3 px-6 py-3.5 rounded-2xl shadow-2xl backdrop-blur-md border text-sm font-black tracking-tight transition-all duration-500 ${toast.type === 'error' ? 'bg-red-500/95 text-white border-red-400' : 'bg-[#065f46]/95 text-white border-[#10b981]/40'}`}>
                            {toast.type === 'error'
                                ? <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                : <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7" /></svg>
                            }
                            {toast.msg}
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto px-6 relative z-10">
                        {/* Section Header */}
                        <div className="text-center mb-16 reveal reveal-delay-1">
                            <div className="flex justify-center items-center space-x-3 mb-4"><div className="w-8 h-[1px] bg-[#10b981]"></div><span className="text-[#10b981] font-bold text-xs tracking-[0.3em] uppercase">The Well System 8</span><div className="w-8 h-[1px] bg-[#10b981]"></div></div>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-900 mb-4 tracking-tight">8단계 정밀 클리닝 로직</h2>
                            <div className="w-16 h-1 bg-[#10b981] mx-auto rounded-full mb-6"></div>
                            <p className="text-lg md:text-xl text-gray-500 font-medium break-keep opacity-90">'위에서 아래로, 안에서 밖으로' 흐르는 체계적인 데이터 기반 작업</p>

                            {isAdmin && (
                                <div className="flex items-center justify-center gap-3 mt-8">
                                    <button
                                        onClick={() => setEditMode(prev => !prev)}
                                        className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 shadow-md border ${editMode ? 'bg-[#065f46] text-white border-[#065f46] shadow-[#065f46]/30' : 'bg-white text-gray-500 border-gray-200 hover:border-[#10b981] hover:text-[#10b981]'}`}
                                    >
                                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                        {editMode ? '편집 모드 종료' : '이미지 편집 모드'}
                                    </button>
                                    {editMode && (
                                        <button
                                            onClick={handleResetAll}
                                            className="flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm bg-white text-red-400 border border-red-200 hover:bg-red-50 hover:border-red-400 transition-all duration-300 shadow-md"
                                        >
                                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                            전체 초기화
                                        </button>
                                    )}
                                </div>
                            )}
                            {isAdmin && editMode && (
                                <div className="mt-4 inline-flex items-center gap-2 bg-[#10b981]/10 border border-[#10b981]/30 text-[#065f46] font-bold text-xs px-5 py-2.5 rounded-full">
                                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    각 카드에 나타난 버튼을 클릭하여 이미지를 교체하거나 초기화하세요
                                </div>
                            )}
                        </div>

                        {/* Cards Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                            {steps.map((step, idx) => {
                                const isActive = activeIdx === idx;
                                const isCustom = stepImages[idx] !== defaultImages[idx];
                                return (
                                    <div
                                        key={idx}
                                        onClick={() => toggleStep(idx)}
                                        className={`rounded-2xl md:rounded-[2.5rem] p-5 md:p-8 shadow-2xl transition-all duration-700 transform lg:hover:-translate-y-2 flex flex-col group h-full relative overflow-hidden border-2 ${editMode ? 'border-[#10b981]/60 cursor-default ring-2 ring-[#10b981]/20' : isActive ? 'border-[#10b981] scale-[1.02]' : 'border-white/10'} ${!editMode ? 'cursor-pointer md:cursor-default' : ''}`}
                                    >
                                        {/* Background Image Layer */}
                                        <div className="absolute inset-0 z-0">
                                            <img src={stepImages[idx]} className={`w-full h-full object-cover transition-transform duration-1000 ${[0, 2].includes(idx) ? 'scale-[1.8] origin-bottom group-hover:scale-[2]' : 'group-hover:scale-110'}`} alt={step.title}
                                                onError={(e) => { e.target.src = defaultImages[idx]; }}
                                            />
                                            <div className={`absolute inset-0 transition-opacity duration-500 ${editMode ? 'bg-black/60' : isActive ? 'bg-black/70' : 'bg-black/50 group-hover:bg-black/60'}`} />
                                        </div>

                                        {/* Edit Mode Overlay */}
                                        {editMode && (
                                            <div className="absolute inset-0 z-20 flex flex-col items-center justify-center gap-3 p-4">
                                                <button
                                                    onClick={(e) => handleEditClick(e, idx)}
                                                    className="flex items-center gap-2 bg-[#10b981] hover:bg-[#065f46] text-white font-black text-[10px] md:text-xs px-4 py-2.5 rounded-xl shadow-xl transition-all duration-300 hover:scale-105 active:scale-95 w-full justify-center border border-white/20"
                                                >
                                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                                    이미지 교체
                                                </button>
                                                {isCustom && (
                                                    <button
                                                        onClick={(e) => handleReset(e, idx)}
                                                        className="flex items-center gap-2 bg-white/15 hover:bg-red-500 text-white font-bold text-[10px] md:text-xs px-4 py-2 rounded-xl shadow-lg transition-all duration-300 hover:scale-105 active:scale-95 w-full justify-center border border-white/20 backdrop-blur-sm"
                                                    >
                                                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                                        기본값 복원
                                                    </button>
                                                )}
                                                {isCustom && (
                                                    <span className="absolute top-3 left-3 bg-[#10b981] text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider shadow">사용자 이미지</span>
                                                )}
                                            </div>
                                        )}

                                        <div className={`flex items-start justify-between mb-4 md:mb-8 z-10 relative ${editMode ? 'opacity-30' : ''}`}>
                                            <div className={`flex flex-col items-center justify-center w-8 h-8 md:w-12 md:h-12 rounded-lg md:rounded-xl font-black text-xs md:text-xl shadow-lg transition-all duration-300 ${isActive ? 'bg-[#10b981] text-white' : 'bg-white/20 text-white backdrop-blur-md group-hover:bg-[#10b981]'}`}>{step.num}</div>
                                            <div className={`w-8 h-8 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg ${step.highlight || isActive ? 'bg-[#10b981] text-white' : 'bg-white/20 text-white backdrop-blur-md group-hover:bg-[#10b981]'}`}><svg className="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24">{step.icon}</svg></div>
                                        </div>
                                        <h3 className={`text-sm md:text-xl font-black mb-1 transition-all duration-300 z-10 relative tracking-tight break-keep ${editMode ? 'opacity-30' : ''} ${isActive ? 'text-[#10b981]' : 'text-white group-hover:text-[#10b981]'}`}>
                                            {step.title}
                                            {!editMode && <svg className={`w-3 h-3 md:hidden inline-block ml-1.5 transition-transform duration-300 ${isActive ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7" /></svg>}
                                        </h3>
                                        <div className={`hidden md:block text-[11px] font-bold uppercase tracking-widest mb-4 z-10 relative ${editMode ? 'opacity-30' : ''} ${step.highlight ? 'text-[#10b981]' : 'text-white/60'}`}>{step.subtitle}</div>

                                        {!editMode && (
                                            <div className={`transition-all duration-500 ease-in-out overflow-hidden md:max-h-none ${isActive ? 'max-h-96 opacity-100 mt-2' : 'max-h-0 opacity-0 md:opacity-100'}`}>
                                                <p className="text-[10px] md:text-[14px] leading-relaxed break-keep z-10 relative text-white/90 font-medium">{step.desc}</p>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </section>
            );
        };

        const ImageModal = ({ src, title, onClose }) => {
            if (!src) return null;
            return (
                <div className="fixed inset-0 z-[100000] flex items-center justify-center p-4 md:p-10 animate-luxury-fade" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/95 backdrop-blur-xl" />
                    <button onClick={onClose} className="fixed top-4 right-4 md:top-8 md:right-8 w-12 h-12 flex items-center justify-center rounded-full bg-white/20 text-white hover:bg-white/40 transition-all z-[100002] border border-white/30 shadow-2xl backdrop-blur-md">
                        <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                    <div className="relative max-w-7xl z-[100001]" onClick={e => e.stopPropagation()}>
                        <img src={src} alt={title} className="max-w-full max-h-[80vh] object-contain rounded-2xl shadow-2xl border border-white/10" />
                        <div className="mt-6 text-center">
                            <h3 className="text-white text-xl md:text-2xl font-black tracking-tight">{title}</h3>
                            <p className="text-white/40 text-xs md:text-sm mt-2 font-bold tracking-tight">이미지 바깥이나 위 닫기 버튼을 클릭하여 돌아가기</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ServiceCard = ({ srv }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isImgModalOpen, setIsImgModalOpen] = useState(false);

            return (
                <React.Fragment>
                    <div className="bg-white rounded-2xl md:rounded-3xl p-5 md:p-10 shadow-[0_4px_25px_rgb(0,0,0,0.03)] hover:shadow-[0_12px_40px_rgb(0,0,0,0.1)] transition-all duration-500 transform lg:hover:-translate-y-2 border border-gray-100 flex flex-col group h-full cursor-pointer relative" onClick={() => setIsOpen(!isOpen)}>
                        {srv.img ? (
                            <div className="relative w-full h-40 md:h-56 rounded-2xl md:rounded-3xl flex-shrink-0 mb-6 md:mb-8 overflow-hidden group-hover:shadow-2xl transition-all duration-700 shadow-md z-10 bg-gray-50 border border-gray-100/50" onClick={(e) => { e.stopPropagation(); setIsImgModalOpen(true); }}>
                                <img src={srv.img} alt={srv.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                <div className="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
                                    <div className="bg-white/30 backdrop-blur-sm rounded-full p-3 md:p-4 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 pointer-events-auto">
                                        <svg className="w-5 h-5 md:w-8 md:h-8 drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="w-12 h-12 md:w-20 md:h-20 bg-[#ecfdf5] rounded-xl md:rounded-2xl flex items-center justify-center text-[#10b981] mb-4 md:mb-8 group-hover:bg-[#065f46] group-hover:text-white group-hover:shadow-lg transition-all duration-500 shadow-inner relative overflow-hidden"><svg className="w-6 h-6 md:w-10 md:h-10" fill="none" viewBox="0 0 24 24">{srv.icon}</svg></div>
                        )}
                        <h3 className="text-base md:text-2xl font-black text-gray-900 mb-2 md:mb-3 group-hover:text-[#065f46] transition-colors">{srv.title}</h3>
                        <p className="text-gray-500 text-[10px] md:text-base leading-tight md:leading-relaxed font-medium break-keep opacity-80 group-hover:opacity-100 transition-opacity mb-2 md:mb-2 flex-grow">{srv.desc}</p>
                        <div className="mt-auto border-t border-gray-100 pt-3 md:pt-5">
                            <div className="flex items-center justify-between w-full text-left text-[#065f46] font-bold text-[9px] md:text-xs tracking-tight transition-all">
                                <span className="hidden md:inline">우리는 이 8단계 원칙을 엄격히 준수합니다</span>
                                <span className="md:hidden">8단계 정밀 공정</span>
                                <svg className={`w-3 h-3 md:w-4 md:h-4 ml-1 flex-shrink-0 transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7" /></svg>
                            </div>
                            <div className={`overflow-hidden transition-all duration-500 ease-in-out ${isOpen ? 'max-h-96 opacity-100 mt-2 md:mt-4' : 'max-h-0 opacity-0'}`}>
                                <ol className="text-[8px] md:text-[11px] text-[#065f46]/80 grid grid-cols-2 gap-x-1 gap-y-2 bg-[#10b981]/5 p-2 md:p-4 rounded-lg md:rounded-xl list-decimal list-inside font-bold whitespace-nowrap overflow-hidden">
                                    {['현장 진단', '안전 보양', '고성능 집진', '맞춤 세정', '기계 세척', '중화 린싱', '보호 코팅', '최종 검수'].map((step, i) => <li key={i} className="overflow-hidden text-ellipsis">{step}</li>)}
                                </ol>
                            </div>
                        </div>
                    </div>
                    {isImgModalOpen && <ImageModal src={srv.img} title={srv.title} onClose={() => setIsImgModalOpen(false)} />}
                </React.Fragment>
            );
        };

        const Services = () => {
            const serviceList = [
                { title: '준공 청소', desc: '시공 후 남은 분진과 유해물질 완벽 제거', img: 'public/images/uploaded_service_new.jpg', icon: null },
                { title: '바닥 청소', desc: '전문 장비와 약품으로 바닥 찌든 때 제거 및 코팅', img: 'public/images/uploaded_service_floor_new.jpg', icon: null },
                { title: '외벽 청소', desc: '건물 외관의 오염물을 제거하여 빌딩 가치 상승', img: 'public/images/uploaded_service_exterior_new.jpg', icon: null },
                { title: '유리 청소', desc: '얼룩 없이 투명한 시야 확보를 위한 특수 클리닝', img: 'public/images/uploaded_service_glass_new.jpg', icon: null }
            ];
            return (
                <section id="services" className="py-16 md:py-24 bg-white relative">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <div className="flex justify-center items-center space-x-3 mb-4"><div className="w-8 h-[1px] bg-[#10b981]"></div><span className="text-[#10b981] font-bold text-xs tracking-[0.3em] uppercase">더 웰 서비스의 핵심 역량</span><div className="w-8 h-[1px] bg-[#10b981]"></div></div>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-900 mb-4 tracking-tight">프리미엄 <span className="text-[#065f46]">클리닝 서비스</span></h2>
                            <div className="w-16 h-1 bg-gray-100 mx-auto rounded-full mb-6"></div>
                            <p className="text-lg md:text-xl text-gray-500 font-medium break-keep opacity-80">단 하나의 얼룩도 허용하지 않는 <span className="text-[#065f46] font-black">더 웰 서비스</span>만의 특화 솔루션</p>
                        </div>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8 items-stretch">
                            {serviceList.map((srv, idx) => <ServiceCard key={idx} srv={srv} />)}
                            <div className="bg-[#065f46] text-white rounded-[2rem] md:rounded-[2.5rem] p-5 md:p-16 flex flex-col lg:flex-row justify-between items-center text-center lg:text-left h-auto shadow-2xl col-span-2 lg:col-span-4 mt-6 md:mt-12 relative overflow-hidden group">
                                <div className="absolute top-0 right-0 w-96 h-96 bg-[#a3e635] rounded-full mix-blend-overlay filter blur-3xl opacity-10 -translate-x-1/4 -translate-y-1/2 group-hover:opacity-30 transition-opacity duration-1000"></div>
                                <div className="relative z-10">
                                    <h3 className="text-lg md:text-4xl font-black mb-3 md:mb-4 leading-tight break-keep">우리 공간에 딱 맞는<br /><span className="text-[#f97316]">견적 솔루션</span>이 필요하신가요?</h3>
                                    <p className="text-gray-300 text-xs md:text-lg font-medium break-keep max-w-xl">더 웰 서비스의 전문가가 직접 방문하여 현장 상황을 진단하고 가장 합리적인 관리 계획을 제안해 드립니다.</p>
                                </div>
                                <a href="#quote" className="relative z-10 glossy-green glossy-shine text-white font-black py-3.5 md:py-6 px-10 md:px-14 rounded-2xl shadow-xl hover:shadow-[#065f46]/30 transition-all w-full lg:w-auto mt-6 md:mt-10 lg:mt-0 flex-shrink-0 text-base md:text-xl transform hover:scale-105 active:scale-95 duration-300 border border-white/20">무료 방문 견적 신청</a>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const PortfolioBoard = ({ onCategorySelect }) => {
            const categories = [
                { id: '준공-청소', name: '준공 청소', desc: '인테리어 시공 및 입주 전 필수 초정밀 클리닝', img: 'public/images/port-main-1.jpg' },
                { id: '바닥-청소', name: '바닥 청소', desc: '특수 장비를 활용한 찌든 때 제거 및 고광택 왁싱 코팅', img: 'public/images/port-main-2.jpg' },
                { id: '외벽-청소', name: '외벽 청소', desc: '산성비로 부식되고 오염된 건축물 마감재 복원 및 정밀 세척', img: 'public/images/port-main-4.jpg' },
                { id: '유리-청소', name: '유리 청소', desc: '얼룩 없는 최상의 시야를 보장하는 고층 특수 투명창 시공', img: 'public/images/port-main-3.jpg' },
            ];
            return (
                <section id="portfolio" className="py-16 md:py-24 bg-gray-50 relative border-t border-gray-100 reveal">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16 reveal reveal-delay-1">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">포트폴리오 갤러리</h2>
                            <div className="w-16 h-1.5 bg-[#10b981] mx-auto rounded-full mb-6"></div>
                            <p className="text-lg md:text-xl text-gray-500 font-medium break-keep opacity-80">아래 카테고리를 클릭하시면 현장의 땀방울이 기록된 <span className="text-[#065f46] font-black">전용 게시판</span>으로 이동합니다.</p>
                        </div>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                            {categories.map((cat) => (
                                <div key={cat.id} onClick={() => onCategorySelect(cat.id)} className="group cursor-pointer flex flex-col items-center">
                                    <div className="w-full h-40 sm:h-64 md:h-80 rounded-2xl md:rounded-[2.5rem] mb-3 md:mb-6 relative overflow-hidden bg-gray-200 shadow-md border border-gray-100 flex-shrink-0">
                                        <img src={cat.img} alt={cat.name} className="absolute inset-0 w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-[800ms] ease-out" />
                                        <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors duration-300"></div>
                                        <div className="absolute inset-0 flex items-end justify-start p-3 md:p-5">
                                            <span className="bg-[#065f46]/90 backdrop-blur-md text-white font-bold px-3.5 py-1.5 md:px-5 md:py-2.5 rounded-xl shadow-lg transform group-hover:-translate-y-1 group-hover:bg-white group-hover:text-[#065f46] group-hover:shadow-[0_10px_20px_rgba(255,255,255,0.2)] transition-all flex items-center duration-300 text-[10px] md:text-sm border border-white/20 group-hover:border-white">
                                                {cat.name}
                                                <svg className="w-3 h-3 md:w-4 md:h-4 ml-1 md:ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                                            </span>
                                        </div>
                                    </div>
                                    <h3 className="text-sm md:text-2xl font-extrabold text-gray-900 mb-1 md:mb-3 group-hover:text-[#10b981] transition-colors break-keep text-center">{cat.name}</h3>
                                    <p className="hidden md:block text-gray-500 text-center text-sm font-medium px-4 break-keep">{cat.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const QuoteForm = () => {
            const [selectedServices, setSelectedServices] = useState([]);
            const [files, setFiles] = useState([]);
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');
            const [message, setMessage] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState('IDLE'); // IDLE, SUCCESS, ERROR
            const [errorDetail, setErrorDetail] = useState('');

            useEffect(() => {
                if (window.emailjs) {
                    emailjs.init("jz_b-sfhwOdr3sERj");
                }
            }, []);

            const toggleService = (id) => {
                setSelectedServices(prev =>
                    prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]
                );
            };

            const handleFileChange = (e) => {
                if (e.target.files) {
                    const newFiles = Array.from(e.target.files).map(f => ({
                        file: f,
                        name: f.name,
                        size: f.size,
                        preview: URL.createObjectURL(f)
                    }));
                    setFiles(prev => [...prev, ...newFiles]);
                }
            };

            const removeFile = (indexToRemove) => {
                setFiles(prev => {
                    const target = prev[indexToRemove];
                    if (target?.preview) URL.revokeObjectURL(target.preview);
                    return prev.filter((_, index) => index !== indexToRemove);
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isSubmitting) return;

                const selectedLabels = services
                    .filter(s => selectedServices.includes(s.id))
                    .map(s => s.label)
                    .join(', ');

                if (!selectedLabels && selectedServices.length === 0) {
                    alert('필요한 서비스를 하나 이상 선택해 주세요.');
                    return;
                }

                setIsSubmitting(true);
                setSubmitStatus('IDLE');
                setErrorDetail('');

                const templateParams = {
                    name: name,
                    phone: phone,
                    services: selectedLabels || '선택 없음',
                    message: message || '내용 없음',
                    file_count: files.length
                };

                try {
                    // ✅ EmailJS를 통한 실제 메일 전송
                    await emailjs.send('naver_service', 'template_p232fz5', templateParams);

                    setSubmitStatus('SUCCESS');

                    // 초기화
                    setSelectedServices([]);
                    setFiles([]);
                    setName('');
                    setPhone('');
                    setMessage('');

                    files.forEach(f => {
                        if (f.preview) URL.revokeObjectURL(f.preview);
                    });
                } catch (error) {
                    console.error('Email 전송 실패:', error);
                    setSubmitStatus('ERROR');
                    // 상세 에러 정보 추출 (Status, Text 등)
                    const errorMsg = error.text || error.message || JSON.stringify(error);
                    setErrorDetail(errorMsg);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const services = [
                { id: '준공청소', label: '준공 청소', icon: <React.Fragment><path d="M3 21V7L12 3L21 7V21H3Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><path d="M9 17H15M12 11V14M12 7V8M17 14L19 16" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><circle cx="18" cy="13" r="1" fill="currentColor" /><circle cx="6" cy="12" r="1.5" fill="currentColor" /></React.Fragment> },
                { id: '바닥청소', label: '바닥 청소', icon: <React.Fragment><path d="M4 14C4 14 6 13 12 13C18 13 20 14 20 14V19C20 19 18 20 12 20C6 20 4 19 4 19V14Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><path d="M12 13V4M12 4L9 7M12 4L15 7M17 9.5L19 10.5M5 10.5L7 9.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /><circle cx="12" cy="16.5" r="1.5" fill="currentColor" /></React.Fragment> },
                { id: '외벽청소', label: '외벽 청소', icon: <path d="M4 21V3H14V21M14 7H20V21M7 7H11M7 11H11M7 15H11M17 11H18M17 15H18M2 21H22" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /> },
                { id: '유리청소', label: '유리 청소', icon: <React.Fragment><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" strokeWidth="1.5" /><path d="M4 10H20M10 4V20" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /><path d="M15 7L18 10M6 14L10 18" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" className="opacity-40" /><path d="M14 14L16 16" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></React.Fragment> },
            ];

            return (
                <section id="quote" className="py-16 md:py-24 bg-white relative overflow-hidden">
                    <div className="absolute top-1/4 -right-20 w-80 h-80 bg-[#10b981]/5 rounded-full blur-[100px]"></div><div className="absolute bottom-1/4 -left-20 w-80 h-80 bg-[#10b981]/5 rounded-full blur-[100px]"></div>
                    <div className="max-w-4xl mx-auto px-6 relative">
                        <div className="bg-white rounded-[2.5rem] md:rounded-[3rem] p-4 sm:p-10 md:p-16 shadow-[0_30px_80px_rgb(0,0,0,0.10)] border border-gray-200 ring-1 ring-gray-100 min-h-[400px] flex flex-col justify-center">

                            {submitStatus === 'SUCCESS' ? (
                                <div className="text-center py-10 animate-luxury-fade">
                                    <div className="w-20 h-20 bg-[#ecfdf5] text-[#10b981] rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner animate-luxury-slide">
                                        <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" /></svg>
                                    </div>
                                    <h2 className="text-3xl md:text-4xl font-black text-gray-900 mb-4 tracking-tight">견적 신청 완료</h2>
                                    <p className="text-gray-500 font-medium text-lg mb-10 break-keep">정상적으로 접수되었습니다.<br />전문 상담사가 확인 후 빠르게 연락드리겠습니다.</p>
                                    <button
                                        onClick={() => setSubmitStatus('IDLE')}
                                        className="px-10 py-4 bg-[#065f46] text-white rounded-2xl font-black text-sm tracking-widest hover:bg-[#10b981] transition-all transform hover:scale-105 active:scale-95 shadow-xl"
                                    >
                                        추가 문의하기
                                    </button>
                                </div>
                            ) : (
                                <React.Fragment>

                                    <div className="text-center mb-8 md:mb-14">
                                        <span className="inline-block px-4 py-1.5 rounded-full glossy-green text-white text-[10px] font-black tracking-[0.2em] uppercase mb-4 md:mb-6 shadow-md border border-white/20">Consultation</span>
                                        <h2 className="text-xl sm:text-3xl md:text-5xl font-black text-gray-900 mb-3 md:mb-5 tracking-tight">무료 방문 견적 신청</h2>
                                        <div className="w-12 h-1 bg-[#10b981]/20 mx-auto rounded-full mb-4 md:mb-6"></div>
                                        <p className="text-xs md:text-base text-gray-500 font-medium max-w-lg mx-auto leading-relaxed opacity-80 break-keep">귀하의 공간에 최적화된 프리미엄 클리닝 솔루션을 제안해 드립니다.</p>
                                        <a href="tel:16888740" className="inline-flex items-center gap-2 mt-3 md:mt-4 text-[#10b981] font-black text-lg md:text-xl tracking-widest hover:text-[#16a34a] transition-colors">
                                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                            1688-8740
                                        </a>
                                    </div>

                                    {submitStatus === 'ERROR' && (
                                        <div className="mb-10 bg-red-50 border-l-4 border-red-500 p-6 rounded-2xl animate-luxury-fade">
                                            <div className="flex">
                                                <div className="flex-shrink-0">
                                                    <svg className="h-6 w-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                </div>
                                                <div className="ml-3">
                                                    <h3 className="text-sm font-black text-red-800 tracking-tight">접수 중 오류가 발생했습니다.</h3>
                                                    <p className="mt-1 text-xs text-red-700 font-medium opacity-80">원인: {errorDetail || '네트워크 상태를 확인해 주세요.'}</p>
                                                    <p className="mt-2 text-[10px] text-red-600 font-bold uppercase tracking-wider">이 화면을 캡처하여 관리자에게 문의해 주세요.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <form onSubmit={handleSubmit} className="space-y-8 md:space-y-10">
                                        <div className="space-y-4"><label className="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-widest ml-1">필요한 청소 서비스</label><div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                            {services.map((service) => (
                                                <button key={service.id} type="button" onClick={() => toggleService(service.id)} className={`group relative flex flex-col items-center justify-center p-3 md:p-4 rounded-2xl border-2 transition-all duration-300 ${selectedServices.includes(service.id) ? 'border-[#065f46] bg-[#065f46] text-white shadow-lg scale-[1.02]' : 'border-gray-50 bg-gray-50/50 text-gray-400 hover:border-gray-200 hover:bg-white'}`}>
                                                    <span className={`text-xl md:text-2xl mb-1.5 md:mb-2 transition-transform duration-300 group-hover:scale-110 ${selectedServices.includes(service.id) ? 'opacity-100' : 'opacity-40'}`}><svg className="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24">{service.icon}</svg></span>
                                                    <span className="text-[10px] md:text-xs font-bold whitespace-nowrap">{service.label}</span>
                                                    {selectedServices.includes(service.id) && <div className="absolute -top-1.5 -right-1.5 w-4 h-4 md:w-5 md:h-5 bg-white text-[#10b981] rounded-full flex items-center justify-center text-[8px] md:text-[10px] font-bold shadow-sm">✓</div>}
                                                </button>
                                            ))}
                                        </div></div>
                                        <div className="grid grid-cols-2 gap-4 md:gap-8">
                                            <div className="relative group"><input type="text" required value={name} onChange={e => setName(e.target.value)} className="peer w-full bg-transparent border-b-2 border-gray-200 py-3 px-1 focus:outline-none focus:border-[#10b981] transition-colors placeholder-transparent text-sm md:text-base" id="name" placeholder="이름 / 상호명" /><label htmlFor="name" className="absolute left-1 top-3 text-gray-400 font-medium transition-all duration-300 pointer-events-none peer-focus:text-xs peer-focus:-translate-y-6 peer-focus:text-[#10b981] peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:-translate-y-6 text-sm md:text-base">이름 / 상호명</label></div>
                                            <div className="relative group"><input type="tel" required value={phone} onChange={e => setPhone(e.target.value)} className="peer w-full bg-transparent border-b-2 border-gray-200 py-3 px-1 focus:outline-none focus:border-[#10b981] transition-colors placeholder-transparent text-sm md:text-base" id="phone" placeholder="연락처" /><label htmlFor="phone" className="absolute left-1 top-3 text-gray-400 font-medium transition-all duration-300 pointer-events-none peer-focus:text-xs peer-focus:-translate-y-6 peer-focus:text-[#10b981] peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:-translate-y-6 text-sm md:text-base">연락처</label></div>
                                        </div>
                                        <div className="relative group"><textarea rows="3" value={message} onChange={e => setMessage(e.target.value)} className="peer w-full bg-transparent border-b-2 border-gray-200 py-3 px-1 focus:outline-none focus:border-[#10b981] transition-colors placeholder-transparent resize-none text-sm md:text-base" id="message" placeholder="문의 내용"></textarea><label htmlFor="message" className="absolute left-1 top-3 text-gray-400 font-medium transition-all duration-300 pointer-events-none peer-focus:text-xs peer-focus:-translate-y-6 peer-focus:text-[#10b981] peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:-translate-y-6 text-sm md:text-base">문의 내용 (평수, 특이사항 등)</label></div>

                                        <div className="space-y-4 pt-2 md:pt-4">
                                            <label className="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-widest ml-1">현장 사진 첨부 (선택)</label>
                                            <input type="file" multiple accept="image/*" onChange={handleFileChange} className="hidden" id="photo-upload" />

                                            {files.length === 0 ? (
                                                <label htmlFor="photo-upload" className="flex flex-col items-center justify-center w-full py-8 md:py-12 border-2 border-dashed border-gray-200 rounded-3xl bg-gray-50/50 hover:bg-white hover:border-[#10b981] transition-all duration-500 cursor-pointer group">
                                                    <div className="w-12 h-12 md:w-16 md:h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-3 md:mb-4 group-hover:scale-110 group-hover:bg-[#10b981] group-hover:text-white transition-all duration-500">
                                                        <svg className="w-6 h-6 md:w-8 md:h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                                                    </div>
                                                    <span className="text-xs md:text-sm text-gray-400 font-bold tracking-tight mb-1 group-hover:text-[#10b981] transition-colors text-center px-4">
                                                        클릭하거나 사진을 드래그하여 업로드하세요
                                                    </span>
                                                    <span className="text-[8px] md:text-[10px] text-gray-300 uppercase tracking-widest">JPG, PNG, WEBP (Max 10MB)</span>
                                                </label>
                                            ) : (
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                                    {files.map((item, index) => (
                                                        <div key={index} className="relative aspect-square rounded-2xl md:rounded-3xl overflow-hidden border border-gray-100 shadow-sm group">
                                                            <img src={item.preview} alt="preview" className="w-full h-full object-cover" />
                                                            <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                                                <button type="button" onClick={() => removeFile(index)} className="w-10 h-10 md:w-12 md:h-12 bg-white/20 hover:bg-red-500 rounded-full text-white flex items-center justify-center backdrop-blur-md transition-all transform hover:scale-110 active:scale-95 shadow-lg border border-white/30" title="사진 삭제">
                                                                    <svg className="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                                </button>
                                                            </div>
                                                            <div className="absolute bottom-2 left-2 bg-black/70 text-white text-[8px] md:text-[10px] px-2.5 py-1 rounded-full backdrop-blur-md font-bold tracking-wider">

        const DraggablePreview = ({ src, initialPosition, onPositionChange, onDelete }) => {
            const imgRef = useRef(null);
            const [pos, setPos] = useState(initialPosition || { x: 50, y: 50 });
            const [isDragging, setIsDragging] = useState(false);
            const [startPos, setStartPos] = useState({ x: 0, y: 0 });

            const handleMouseDown = (e) => {
                setIsDragging(true);
                setStartPos({ x: e.clientX, y: e.clientY });
            };

            const handleMouseMove = (e) => {
                if (!isDragging || !imgRef.current) return;
                const dx = e.clientX - startPos.x;
                const dy = e.clientY - startPos.y;
                const rect = imgRef.current.getBoundingClientRect();
                const percentX = (dx / rect.width) * 100;
                const percentY = (dy / rect.height) * 100;
                let newX = Math.min(100, Math.max(0, pos.x - percentX * 1.5));
                let newY = Math.min(100, Math.max(0, pos.y - percentY * 1.5));
                setPos({ x: newX, y: newY });
                setStartPos({ x: e.clientX, y: e.clientY });
                if (onPositionChange) onPositionChange({ x: newX, y: newY });
            };

            const handleMouseUp = () => setIsDragging(false);
            const handleMouseLeave = () => setIsDragging(false);

            return (
                <div className="relative w-full h-32 overflow-hidden rounded-xl border border-gray-200 group bg-gray-100" onMouseUp={handleMouseUp} onMouseLeave={handleMouseLeave}>
                    <div ref={imgRef} className="w-full h-full cursor-move" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} style={{ backgroundImage: `url(${src})`, backgroundSize: 'cover', backgroundPosition: `${pos.x}% ${pos.y}%`, backgroundRepeat: 'no-repeat' }} />
                    <div className="absolute inset-0 border-2 border-[#10b981] opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-10 flex items-center justify-center">

                </div>
            );

        /**
         * TheWellDB - Unified Storage Service (Full-Stack Sync)
         * Automatically switches between Server (api.php) and Local (IndexedDB) storage.
         */
        const TheWellDB = {
            dbName: 'TheWellServiceDB',
            storeNames: ['portfolio', 'reviews', 'system_images'],
            version: 2,
            baseUrl: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : '', // Adapt based on hosting
            apiUrl: 'api.php',

            // --- Server Sync Methods ---
            async fetchAll() {
                try {
                    const response = await fetch(this.apiUrl);
                    if (!response.ok) throw new Error('Server not reachable');
                    return await response.json();
                } catch (err) {
                    console.warn('Server sync failed, falling back to local DB:', err);
                    return null;
                }
            },

            async pushToServer(data) {
                try {
                    // Pass admin password if available in session
                    const isAdmin = sessionStorage.getItem('wellservice_admin') === 'true';
                    const response = await fetch(this.apiUrl, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Admin-Password': isAdmin ? (localStorage.getItem('wellservice_admin_pwd') || '0000') : ''
                        },
                        body: JSON.stringify(data)
                    });
                    return response.ok;
                } catch (err) {
                    console.error('Push to server failed:', err);
                    return false;
                }
            },

            // --- Local Storage Methods (IndexedDB) ---
            open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        this.storeNames.forEach(name => {
                            if (!db.objectStoreNames.contains(name)) {
                                db.createObjectStore(name, { keyPath: 'id', autoIncrement: name !== 'portfolio' });
                            }
                        });
                        // Migration for old store
                        if (db.objectStoreNames.contains('portfolio_posts')) {
                            db.deleteObjectStore('portfolio_posts');
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async getLocal(storeName) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async saveLocal(storeName, data) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    store.clear().onsuccess = () => {
                        if (Array.isArray(data)) {
                            data.forEach(item => store.put(item));
                        } else {
                            store.put(data);
                        }
                    };
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
            },

            // --- Unified API ---
            async loadAll() {
                const serverData = await this.fetchAll();
                if (serverData) {
                    // Update local cache too
                    for (const store of this.storeNames) {
                        if (serverData[store]) await this.saveLocal(store, serverData[store]);
                    }
                    return serverData;
                }
                // Fallback to local
                const localData = {};
                for (const store of this.storeNames) {
                    localData[store] = await this.getLocal(store);
                }
                return localData;
            },

            async updateStore(storeName, updatedArray) {
                // Read full DB first to preserve other stores
                const fullData = await this.loadAll();
                fullData[storeName] = updatedArray;
                
                // Save locally
                await this.saveLocal(storeName, updatedArray);
                
                // Push to server
                return await this.pushToServer(fullData);
            }
        };

        const BoardPage = ({ category, onBack, isAdmin }) => {
            const readableCategory = category ? category.replace('-', ' ') : '알 수 없음';

            const seedPosts = useMemo(() => [
                {
                    id: 1, category: '준공-청소', title: `[준공 청소] 첫 번째 프리미엄 현장`, content: `더 웰 서비스만의 독보적인 8단계 세척 시스템을 적용한 대표 사례입니다. 대형 창호와 특수 바닥재의 오염을 완벽하게 제거하여 본래의 광택을 되찾아드렸습니다. 상세 리포트에서 작업 전후의 놀라운 변화를 확인하세요.`, date: '2026.03.20', img: 'public/images/port-main-1.jpg',
                    detail: {

                },
                {
                    id: 2, category: '바닥-청소', title: `[바닥 청소] 두 번째 디테일 작업 완료`, content: `정밀 바닥 세척과 왁스 코팅을 통해 공간의 위생 등급을 한 차원 높인 현장입니다. 특수 장비를 활용하여 찌든 때를 뿌리까지 제거했습니다.`, date: '2026.03.15', img: 'public/images/port-main-2.jpg',
                    detail: {
                        before: [{ url: 'public/images/port-main-2.jpg', posX: 50, posY: 50 }],
                        during: [],

                    }

            ], []);

            const [allPosts, setAllPosts] = useState([]);
            const [isDataLoaded, setIsDataLoaded] = useState(false);

            useEffect(() => {
                const initData = async () => {
                    try {
                        const fullData = await TheWellDB.loadAll();

                        if (data.length === 0) {

                                data = seedPosts;
                                await TheWellDB.updateStore('portfolio', seedPosts);
                            }

                        setAllPosts(data);
                    } catch (err) {
                        console.error('DB Load Error:', err);
                        setAllPosts(seedPosts);
                    } finally {
                        setIsDataLoaded(true);
                    }
                };
                initData();
            }, []);

            const posts = useMemo(() => allPosts.filter(p => !category || p.category === category), [allPosts, category]);

            const [activeIndex, setActiveIndex] = useState(0);
            const [stage, setStage] = useState('after');
            const [imgIndex, setImgIndex] = useState(0);

            useEffect(() => { window.scrollTo(0, 0); setActiveIndex(0); }, [category]);

            const activePost = posts[activeIndex];
            
            const stageSequence = useMemo(() => {
                if (!activePost || !activePost.detail) return ['after'];
                const seq = [];
                if (activePost.detail.before?.length > 0) seq.push('before');
                if (activePost.detail.during?.length > 0) seq.push('during');
                if (activePost.detail.after?.length > 0) seq.push('after');
                return seq.length > 0 ? seq : ['after'];
            }, [activePost]);

            const currentDetailImages = useMemo(() => {
                return (activePost && activePost.detail && activePost.detail[stage]) ? activePost.detail[stage] : [];
            }, [activePost, stage]);

            const activeImg = useMemo(() => {
                if (!activePost) return null;
                if (currentDetailImages.length > 0) {
                    return currentDetailImages[imgIndex] || currentDetailImages[0];
                }
                return { url: activePost.img, posX: 50, posY: 50 };
            }, [activePost, currentDetailImages, imgIndex]);

            const nextStage = (e) => {
                if (e) e.stopPropagation();
                const nextIdx = (stageSequence.indexOf(stage) + 1) % stageSequence.length;
                setStage(stageSequence[nextIdx]);
                setImgIndex(0);
            };

            const prevStage = (e) => {
                if (e) e.stopPropagation();
                const prevIdx = (stageSequence.indexOf(stage) - 1 + stageSequence.length) % stageSequence.length;
                setStage(stageSequence[prevIdx]);
                setImgIndex(0);
            };

            const nextImage = (e) => {
                if (e) e.stopPropagation();
                if (currentDetailImages.length > 1 && imgIndex < currentDetailImages.length - 1) {
                    setImgIndex(prev => prev + 1);
                } else {
                    nextStage(e);
                }
            };

            const prevImage = (e) => {
                if (e) e.stopPropagation();
                if (imgIndex > 0) {
                    setImgIndex(prev => prev - 1);
                } else {
                    const prevIdx = (stageSequence.indexOf(stage) - 1 + stageSequence.length) % stageSequence.length;
                    const prevStageName = stageSequence[prevIdx];
                    setStage(prevStageName);
                    const prevStageImages = activePost.detail[prevStageName] || [];
                    setImgIndex(Math.max(0, prevStageImages.length - 1));
                }
            };

            const saveAll = async (updated) => {
                setAllPosts(updated);
                try {
                    await TheWellDB.updateStore('portfolio', updated);
                } catch (err) {
                    console.error('DB Save Error:', err);
                }
            };


            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ title: '', content: '' });
            const [filesData, setFilesData] = useState({ main: null, before: [], during: [], after: [] });

            const compressToBase64 = (file, maxSize = 1000) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let { width, height } = img;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
                            else { width = Math.round(width * maxSize / height); height = maxSize; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            const [isUploading, setIsUploading] = useState(false);

            const handleFileChange = async (e, stageType) => {
                if (!e.target.files || e.target.files.length === 0) return;
                const rawFiles = Array.from(e.target.files);
                const converted = await Promise.all(rawFiles.map(async (f) => ({
                    file: f, url: await compressToBase64(f), posX: 50, posY: 50
                })));
                if (stageType === 'main') setFilesData(prev => ({ ...prev, main: converted[0] }));
                else setFilesData(prev => ({ ...prev, [stageType]: [...prev[stageType], ...converted] }));
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!formData.title.trim()) return;
                setIsUploading(true);
                try {
                    const fallbackImg = posts.length > 0 ? posts[0].img : 'public/images/port-main-1.jpg';
                    const detailImgs = {
