        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');

            --brand-green-deep: #065f46;

            --brand-navy: #1e3a5f;

            scroll-behavior: smooth;
        }

        .text-brand-green {
            color: var(--brand-green);
        }

        .bg-brand-green {
            background-color: var(--brand-green);
        }

        .text-brand-green-deep {
            color: var(--brand-green-deep);
        }

        .bg-brand-green-deep {
            background-color: var(--brand-green-deep);
        }

        .text-luxury-gold {
            color: var(--luxury-gold);
        }

        .bg-luxury-gold {
            background-color: var(--luxury-gold);
        }

        .text-brand-coral {
            color: var(--brand-coral);
        }

        .bg-brand-coral {
            background-color: var(--brand-coral);
        }

        @keyframes luxury-fade {
            0% {
                opacity: 0;
                filter: blur(20px) brightness(1.5);
                transform: scale(1.1);
            }

            100% {
                opacity: 1;
                filter: blur(0) brightness(1);
                transform: scale(1);
            }
        }

        @keyframes luxury-slide {
            0% {
                opacity: 0;
                transform: translateX(50px);
                filter: blur(10px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
                filter: blur(0);
            }
        }

        .animate-luxury-fade {
            animation: luxury-fade 0.8s cubic-bezier(0.6, 0.01, 0.05, 0.95) forwards;
        }

        .animate-luxury-slide {
            animation: luxury-slide 0.6s cubic-bezier(0.6, 0.01, 0.05, 0.95) 0.1s forwards;
        }

        .glossy-green {
            background: linear-gradient(135deg, var(--brand-green-light) 0%, var(--brand-green) 50%, var(--brand-green-dark) 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 10px 20px rgba(34, 197, 94, 0.2);
            position: relative;
            overflow: hidden;
        }

        .glossy-green-deep {
            background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-green-dark) 50%, var(--brand-green-deep) 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 10px 30px rgba(6, 78, 59, 0.15);
            position: relative;
            overflow: hidden;
        }

        .glossy-shine::after {
            content: '';

            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;

            transform: skewX(-25deg);
            transition: 0.75s;

        .glossy-shine:hover::after {

        .custom-scrollbar::-webkit-scrollbar {

        }

        }

            background: var(--brand-green);

        /* Scroll Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);

            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 {
            transition-delay: 0.1s;
        }

        .reveal-delay-2 {
            transition-delay: 0.2s;
        }

        .reveal-delay-3 {

            100% {
                transform: translateY(0px);
            }

            line-height: 1.2;
        }

        .brand-icon-subtitle {
            display: none;

            .brand-icon-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));

            }

        /* Ken Burns Effect */

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ⚙️ 관리자 비밀번호 (localStorage 우선, 없으면 기본값)
        const getAdminPassword = () => localStorage.getItem('wellservice_admin_pwd') || '0000';

        const Header = ({ onNavigate, isHome, isMenuOpen, setIsMenuOpen, onAdminTrigger, isAdmin }) => {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const toggleMenu = () => setIsMenuOpen(prev => !prev);
            const handleNav = (hash) => {
                onNavigate(hash);
                setIsMenuOpen(false);
            };

            const isTransparent = !isScrolled && isHome;

            return (
                <header className={`fixed top-0 left-0 w-full z-[100] transition-all duration-700 ${!isTransparent ? 'bg-white/95 backdrop-blur-md shadow-lg py-3 border-b border-[#10b981]/10' : 'bg-transparent py-6'} translate-y-0 opacity-100`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        <div onClick={() => handleNav('/')} onDoubleClick={(e) => { e.preventDefault(); onAdminTrigger && onAdminTrigger(); }} className="relative flex items-center cursor-pointer group py-2 md:py-3 px-4 md:px-6 -ml-4 md:-ml-6" title="">
                            {/* Wiper Squeegee Swipe Background for entire Logo Lockup */}
                            <div className={`absolute inset-0 bg-white/95 -skew-x-[15deg] rounded-sm shadow-md transition-all duration-700 ${isTransparent ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-4'} -z-10`}></div>
                            
                            <div className="relative w-12 h-12 md:w-16 md:h-16 flex items-center justify-center group overflow-visible">
                                <div className={`absolute inset-0 bg-[#065f46] rounded-full blur-2xl transition-opacity duration-1000 ${isAdmin ? 'opacity-30 mix-blend-screen' : 'opacity-0 group-hover:opacity-10'} `}></div>
                                <img src="public/images/logo_transparent.png" alt="THE WELL SERVICE 로고" className="w-[120%] h-[120%] relative z-10 transition-transform duration-700 group-hover:scale-110 object-contain drop-shadow-sm" />
                            </div>

                            <div className="flex flex-col items-center ml-3 md:ml-4 z-20 whitespace-nowrap overflow-visible">
                                <span className="text-[8px] md:text-[11px] font-black text-[#10b981] tracking-[0.1em] opacity-80 uppercase mb-0.5 md:mb-1">종합 청소 전문 업체</span>
                                <span className="text-xl md:text-3xl font-black tracking-tighter transition-colors duration-300 text-[#065f46] leading-none">더 웰 서비스</span>
                                <span className="mt-1 md:mt-1.5 text-[8.5px] md:text-[10px] font-premium italic font-bold text-[#10b981] tracking-[0.25em] uppercase drop-shadow-sm whitespace-nowrap pl-[0.25em]">The Well Service</span>
                            </div>

                            <a href="tel:16888740" className="hidden sm:flex items-center gap-1 md:gap-2 border-l-2 pl-2 md:pl-4 transition-all whitespace-nowrap font-black text-[12px] sm:text-sm md:text-base mt-2 text-[#10b981] border-[#10b981]/20 hover:text-[#065f46]">
                                <svg className="w-3 h-3 md:w-4 md:h-4 text-[#10b981]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                <span className="tracking-tight">1688-8740</span>
                            </a>
                        </div>

                        {/* Desktop Nav */}
                        <nav className={`hidden xl:flex space-x-10 font-bold tracking-tight cursor-pointer transition-colors duration-300 ${isTransparent ? 'text-white/90' : 'text-gray-700'}`}>
                            {[
                                { name: '경영 철학', hash: '#brand-story' },
                                { name: '서비스 소개', hash: '#services' },
                                { name: '포트폴리오', hash: '#portfolio' },
                                { name: '고객 후기', hash: '#reviews' },
                                { name: '무료 견적 신청', hash: '#quote' }
                            ].map((item) => (
                                <a key={item.name} onClick={() => onNavigate(item.hash)} className={`transition-all duration-300 relative group ${isTransparent ? 'hover:text-[#10b981]' : 'hover:text-[#065f46]'}`}>
                                    {item.name}
                                    <span className={`absolute -bottom-1 left-0 w-0 h-0.5 transition-all group-hover:w-full ${isTransparent ? 'bg-white' : 'bg-[#10b981]'}`}></span>
                                </a>
                            ))}
                        </nav>

                        {/* Mobile Hamburger Button */}
                        <button onClick={toggleMenu} className="xl:hidden w-10 h-10 flex flex-col items-center justify-center space-y-1.5 focus:outline-none z-[110]" aria-label="메뉴 열기">
                            <span className={`w-6 h-0.5 transition-all duration-300 ${isMenuOpen ? 'rotate-45 translate-y-2 bg-gray-800' : (isTransparent ? 'bg-white' : 'bg-gray-800')}`}></span>

                            <span className={`w-6 h-0.5 transition-all duration-300 ${isMenuOpen ? '-rotate-45 -translate-y-2 bg-gray-800' : (isTransparent ? 'bg-white' : 'bg-gray-800')}`}></span>
                        </button>
                    </div>
                </header>
            );
        };

        {/* 모바일 메뉴 오버레이: backdrop-blur 스태킹 컨텍스트 버그 방지를 위해 헤더 외부에서 독립 렌더링 */ }
        const MobileMenuOverlay = ({ isMenuOpen, setIsMenuOpen, onNavigate, bizInfo }) => {
            const handleNav = (hash) => {
                onNavigate(hash);
                setIsMenuOpen(false);
            };
            return (
                <div className={`fixed inset-0 bg-white z-[99999] transition-all duration-500 ease-in-out xl:hidden ${isMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                    <div className="flex flex-col items-center justify-center h-full space-y-10 p-6">
                        <button onClick={() => setIsMenuOpen(false)} className="absolute top-6 right-6 w-12 h-12 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-gray-900 transition-colors">
                            <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                        <a onClick={() => handleNav('#brand-story')} className="text-2xl font-black text-gray-900 border-b-2 border-transparent hover:border-[#10b981] transition-all cursor-pointer">경영 철학</a>
                        <a onClick={() => handleNav('#services')} className="text-2xl font-black text-gray-900 border-b-2 border-transparent hover:border-[#10b981] transition-all cursor-pointer">서비스 소개</a>
                        <a onClick={() => handleNav('#portfolio')} className="text-2xl font-black text-gray-900 border-b-2 border-transparent hover:border-[#10b981] transition-all cursor-pointer">포트폴리오</a>
                        <a onClick={() => handleNav('#reviews')} className="text-2xl font-black text-gray-900 border-b-2 border-transparent hover:border-[#10b981] transition-all cursor-pointer">고객 후기</a>
                        <a onClick={() => handleNav('#quote')} className="text-2xl font-black text-gray-900 border-b-2 border-transparent hover:border-[#10b981] transition-all cursor-pointer">무료 견적 신청</a>
                        <div className="pt-8">
                            <a href={`tel:${bizInfo.phone.replace(/[^0-9]/g, '')}`} className="flex items-center space-x-3 text-[#10b981] font-black text-xl bg-[#ecfdf5] px-8 py-4 rounded-2xl shadow-md">
                                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                <span>{bizInfo.phone}</span>
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        const Hero = ({ onNavigate }) => (
            <section id="home" className="relative min-h-[90vh] md:h-screen flex items-center justify-center overflow-hidden pt-24 md:pt-20">
                {/* 배경 이미지 및 오버레이 강화 (Clean Bright Effect 적용) */}
                <div className="absolute inset-0 z-0 overflow-hidden">
                    <img 
                        src={`public/images/hero_bg.jpg?t=${Date.now()}`} 
                        alt="더 웰 서비스 작업 현장" 
                        className="w-full h-full object-cover brightness-[0.80] contrast-[1.1] saturate-[1.05] animate-kenburns"
                    />
                    <div className="absolute inset-0 bg-gradient-to-b from-slate-900/95 via-slate-900/40 to-slate-900/95"></div>

                        {/* 럭셔리 블랙 & 골드 사선 배경 (가독성 및 대비 확대를 위한 컬러 전환) */}
                        <div className="absolute inset-0 bg-gradient-to-r from-gray-900/95 to-black/95 backdrop-blur-xl -skew-x-[15deg] border-l-[3px] border-[#d4af37] shadow-[0_10px_30px_rgba(0,0,0,0.5)] transition-all duration-500 group-hover:scale-[1.03] group-hover:-skew-x-[18deg] group-hover:border-[#fce68a]"></div>
                        {/* 오버레이 텍스트 */}
                        <span className="relative z-10 py-3 md:py-3.5 px-10 md:px-14 text-white font-black text-[12px] md:text-[15px] tracking-[0.25em] drop-shadow-lg pl-[0.25em]">
                            <span className="text-[#d4af37]">프리미엄</span> 종합 청소 전문업체
                        </span>
                    </div>
                    <h1 className="text-[30px] sm:text-4xl md:text-5xl lg:text-[3.75rem] font-black text-white leading-[1.3] md:leading-[1.2] mb-6 md:mb-10 tracking-tight break-keep max-w-4xl mx-auto reveal drop-shadow-[0_10px_20px_rgba(0,0,0,0.6)]">
                        <span className="block drop-shadow-xl">공간의 가치는 <span className="inline-block whitespace-nowrap"><span className="text-[#10b981] text-glow">머무는 사람</span>으로부터,</span></span>
                        <span className="block text-gray-100 font-bold text-[20px] sm:text-3xl md:text-4xl lg:text-[2.75rem] mt-3 md:mt-6 opacity-95">
                            <span className="text-[#10b981] font-black text-glow">더 웰 서비스</span>가 그 가치의 정점을 완성합니다
                        </span>
                    </h1>
                    <p className="text-sm sm:text-lg md:text-xl text-gray-200 mb-6 md:mb-16 max-w-2xl font-semibold leading-relaxed break-keep reveal reveal-delay-1 drop-shadow-2xl">
                        준공·상가·입주·바닥·외벽을 아우르는 <strong className="text-white">프리미엄 종합 청소 솔루션.</strong><br className="hidden md:block" />
                        전문가의 정밀한 시스템으로 타협 없는 타의 추종을 불허하는 '진짜 깨끗함'을 증명합니다.
                    </p>
                    <div className="flex flex-wrap items-center justify-center w-full gap-3 md:gap-5 reveal reveal-delay-2">
                        {[
                            { label: '경영 철학', hash: '#brand-story' },
                            { label: '서비스 소개', hash: '#services' },
                            { label: '포트폴리오', hash: '#portfolio' },
                            { label: '고객 후기', hash: '#reviews' }
                        ].map((btn, i) => (
                            <a key={i} onClick={() => onNavigate(btn.hash)} className="btn-glass text-white px-5 md:px-9 py-3 md:py-4 rounded-2xl font-bold text-xs md:text-base cursor-pointer">
                                {btn.label}
                            </a>
                        ))}
                        <a onClick={() => onNavigate('#quote')} className="glossy-green glossy-shine text-white px-6 md:px-14 py-3.5 md:py-5 rounded-2xl font-black text-sm md:text-lg shadow-[0_20px_40px_rgba(16,185,129,0.5)] hover:shadow-[0_25px_50px_rgba(16,185,129,0.7)] hover:scale-105 transition-all transform duration-300 cursor-pointer">
                            무료 견적 신청
                        </a>
                    </div>
                </div>
            </section>
        );



        const BrandStory = () => (
            <section id="brand-story" className="py-16 md:py-24 bg-white relative">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="text-center mb-20">
                        <div className="flex flex-col items-center mb-6">
                            <span className="text-[#10b981] font-black text-[10px] md:text-xs tracking-[0.4em] uppercase mb-3 opacity-60">Brand Identity</span>
                            <div className="flex justify-center items-center space-x-3">
                                <div className="w-8 md:w-12 h-[1px] bg-[#10b981]/30"></div>
                                <span className="text-[#10b981] font-bold text-xs md:text-sm tracking-[0.2em] uppercase opacity-80">경영 철학</span>
                                <div className="w-8 md:w-12 h-[1px] bg-[#10b981]/30"></div>
                            </div>
                        </div>
                        <h2 className="text-2xl sm:text-3xl lg:text-4xl font-black text-gray-900 mb-5 tracking-tight break-keep reveal">단순한 공간 정리를 넘어, <br className="sm:hidden" /><span className="text-[#065f46]">완벽에 가까운 청결을 기준 삼다.</span></h2>
                        <div className="w-16 h-1 bg-gray-100 mx-auto rounded-full mb-8 reveal reveal-delay-1"></div>
                        <p className="text-lg sm:text-xl lg:text-2xl font-black text-gray-800 tracking-tight break-keep max-w-3xl mx-auto leading-tight reveal reveal-delay-2">"전문가들의 정교한 시스템으로 빚어낸 <br className="sm:hidden" />가장 건강한 'Well-being' 공간"</p>
                    </div>
                    <div className="grid lg:grid-cols-12 gap-12 lg:gap-16 items-start">
                        <div className="lg:col-span-7 space-y-10 reveal">
                            <div className="bg-white rounded-[2rem] md:rounded-[2.5rem] p-8 md:p-14 border border-gray-100 shadow-[0_10px_50px_rgb(0,0,0,0.04)] relative overflow-hidden group">
                                <div className="absolute top-0 left-0 w-1 h-32 bg-[#10b981] group-hover:h-full transition-all duration-700"></div>
                                <div className="space-y-6 md:space-y-8 text-gray-700 text-base md:text-lg leading-[1.7] md:leading-[1.8] font-medium break-keep relative z-10">
                                    <p>우리가 정의하는 청소는 단순한 오염 제거가 아닙니다.<br />건축물이 가진 본연의 빛을 되찾아주는 동시에, 그 안에서 숨 쉬는 사람들의 <strong className="text-[#065f46] font-black">{'\'건강한 삶(Well-being)\''}</strong>을 설계하는 일입니다.</p>
                                    <p>더 웰 서비스는 눈에 보이는 깨끗함 그 너머의 가치를 봅니다.<br />준공 현장의 미세한 분진부터 외벽과 유리의 고착된 오염까지, 우리는 각 분야의 스페셜리스트들이 모인 체계적인 팀워크로 대응합니다.</p>
                                    <p className="text-[#f97316] font-black text-lg md:text-xl italic drop-shadow-sm">"공간의 가치는 결국 머무는 사람으로부터 시작되기 때문입니다."</p>
                                    <div className="pt-6 border-t border-green-200/50"><p className="text-gray-900 font-bold text-base md:text-lg">호흡의 질을 바꾸는 정밀 바닥 관리, 건물의 생명력을 연장하는 외벽 복원, 가장 맑은 시야를 선사하는 유리 케어까지.<br />더 웰 서비스의 숙련된 전문가 그룹이 당신의 비즈니스 공간을 가장 안전하고 풍요로운 '웰빙'의 장소로 완성해 드리겠습니다.</p></div>
                                </div>
                            </div>
                        </div>
                        <div className="brand-icon-grid lg:col-span-5 grid">
                            {[
                                { t: '친환경', st: '에코 시스템', icon: <React.Fragment><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="#10b981" fillOpacity="0.1" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.2" d="M12 3C12 3 5 8 5 14C5 17.866 8.13401 21 12 21C15.866 21 19 17.866 19 14C19 8 12 3 12 3Z" /></React.Fragment> },
                                { t: '전문성', st: '독자적 8단계 로직', icon: <React.Fragment><rect x="4" y="4" width="16" height="16" rx="2" fill="#10b981" fillOpacity="0.1" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.2" d="M9 12l2 2 4-4m5.618-4.016A3.323 3.323 0 0010.605 7.065a11.062 11.062 0 01-2.341 5.623m-7.603-.997a2.983 2.983 0 001.242 7.213" /></React.Fragment> },
                                { t: '신뢰', st: '고객 맞춤 신뢰', icon: <React.Fragment><circle cx="12" cy="12" r="9" fill="#10b981" fillOpacity="0.1" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></React.Fragment> },
                                { t: '완벽함', st: '하자 없는 완벽 시공', icon: <React.Fragment><path d="M12 2L15 8H21L16 12L18 18L12 14L6 18L8 12L3 8H9L12 2Z" fill="#10b981" fillOpacity="0.1" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.2" d="M12 2L15 8H21L16 12L18 18L12 14L6 18L8 12L3 8H9L12 2Z" /></React.Fragment> }
                            ].map((item, i) => (
                                <div key={i} className="brand-icon-card bg-white shadow-[0_4px_20px_rgb(0,0,0,0.02)] border border-gray-50 transform hover:-translate-y-1.5 transition-all duration-500 group flex flex-col items-center justify-center aspect-square">
                                    <div className="brand-icon-box flex-shrink-0 bg-[#ecfdf5] text-[#10b981] flex items-center justify-center shadow-inner group-hover:bg-[#065f46] group-hover:text-white transition-all duration-500 relative overflow-hidden">
                                        <div className="absolute inset-0 bg-white/20 group-hover:bg-transparent transition-colors"></div>
                                        <svg className="brand-icon-svg relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            {item.icon}
                                        </svg>
                                    </div>
                                    <h4 className="brand-icon-title font-black text-gray-900 mb-0.5 text-center">{item.t}</h4>
                                    <p className="brand-icon-subtitle text-gray-400 font-bold text-[11px] tracking-wider uppercase opacity-80 text-center">{item.st}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </section>
        );


        const Reviews = ({ isAdmin }) => {
            const seed = [
                { id: 1, name: '김*호 담당자', company: 'ㅇㅇ시청', text: '관공서 특성상 위생과 보안이 중요한데, 매뉴얼대로 정말 꼼꼼하게 작업해주셔서 만족스럽습니다.', rating: 5, date: '2024.03.15', isUser: true, password: '0000' },
                { id: 2, name: '이*영 대표', company: '(주)혁신 IT 기업', text: '직원들이 출근했을 때 사무실이 상쾌해서 너무 좋아합니다. 업무 효율이 저절로 올라가는 기분이에요.', rating: 5, date: '2024.03.10', isUser: true, password: '0000' },
                { id: 3, name: '박*진 현장소장', company: '대형 복합건물', text: '준공 청소를 맡겼는데 눈에 보이지 않는 먼지까지 확실히 잡아주셔서 입주자들 컴플레인이 없었습니다.', rating: 4, date: '2024.03.05', isUser: true, password: '0000' },
                { id: 4, name: '최*준 팀장', company: '메디컬 센터', text: '병원이라 위생이 최우선인데, 정밀 살균 세척 덕분에 안심하고 진료에 집중할 수 있게 되었습니다.', rating: 5, date: '2024.02.28', isUser: true, password: '0000' },
                { id: 5, name: '정*미 실장', company: '디자인 스튜디오', text: '유리창 클리닝 후 채광이 달라졌어요. 공간의 전체적인 분위기가 밝아져서 아주 만족합니다.', rating: 5, date: '2024.02.20', isUser: true, password: '0000' },
                { id: 6, name: '한*수 담당', company: '물류 클러스터', text: '바닥 고광택 왁싱 후 관리가 너무 편해졌네요. 내구성도 좋고 보기에도 훨씬 전문적입니다.', rating: 5, date: '2024.02.15', isUser: true, password: '0000' },
            ];

            const [page, setPage] = React.useState(0);
            const [showForm, setShowForm] = React.useState(false);
            const [showLookup, setShowLookup] = React.useState(false);
            const [selectedDetail, setSelectedDetail] = React.useState(null);
            const [submitted, setSubmitted] = React.useState(false);
            const [editingId, setEditingId] = React.useState(null);
            const [reviews, setReviews] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('wellservice_all_reviews_v3');
                    const parsed = saved ? JSON.parse(saved) : null;
                    if (parsed && parsed.length > 0) {
                        return parsed.map(r => r.isUser === undefined ? { ...r, isUser: true, password: '0000' } : r);
                    }
                    return seed;
                } catch { return seed; }
            });
            const [form, setForm] = React.useState({ name: '', company: '', text: '', password: '', rating: 5 });
            const [lookupForm, setLookupForm] = React.useState({ name: '', password: '', error: '' });
            const [promptState, setPromptState] = React.useState({ show: false, action: null, review: null, pin: '', error: '' });

            const perPage = 5;
            const totalPages = Math.ceil(reviews.length / perPage);
            const visible = reviews.slice().reverse().slice(page * perPage, page * perPage + perPage);

            const save = (updated) => {
                localStorage.setItem('wellservice_all_reviews_v3', JSON.stringify(updated));
                setReviews(updated);
            };

            const openNew = () => { setEditingId(null); setForm({ name: '', company: '', text: '', password: '', rating: 5 }); setShowForm(true); setSubmitted(false); };
            const openEdit = (r) => { setEditingId(r.id); setForm({ name: r.name, company: r.company, text: r.text, password: r.password || '', rating: r.rating || 5 }); setShowForm(true); setSubmitted(false); setSelectedDetail(null); };
            const closeForm = () => { setShowForm(false); setSubmitted(false); setEditingId(null); };
            const openDetail = (r) => { setSelectedDetail(r); };
            const closeDetail = () => { setSelectedDetail(null); };

            const handleLookup = (e) => {
                e.preventDefault();
                const match = reviews.find(r => 
                    r.name.trim() === lookupForm.name.trim() && 
                    String(r.password) === String(lookupForm.password)
                );
                if (match) {
                    setLookupForm({ name: '', password: '', error: '' });
                    setShowLookup(false);
                    setSelectedDetail(match);
                } else {
                    setLookupForm(prev => ({ ...prev, error: '정보와 일치하는 후기를 찾을 수 없습니다.' }));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.name.trim() || !form.text.trim()) return;
                let updated;
                const now = new Date();
                const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
                
                if (editingId) {
                    updated = reviews.map(r => String(r.id) === String(editingId) ? { ...r, ...form } : r);
                } else {
                    updated = [...reviews, { id: Date.now(), ...form, date: dateStr, isUser: true }];
                }
                save(updated);
                setForm({ name: '', company: '', text: '', password: '', rating: 5 });
                setSubmitted(true);
                setTimeout(() => { closeForm(); if (!editingId) setPage(0); }, 2000);
            };

            const handleDelete = (id) => {
                const targetId = String(id);
                const updated = reviews.filter(r => String(r.id) !== targetId);
                save(updated);
                const newMaxPage = Math.max(0, Math.ceil(updated.length / perPage) - 1);
                if (page > newMaxPage) setPage(newMaxPage);
                setSelectedDetail(null);
            };

            const handleEditRequest = (r) => {
                if (isAdmin) { openEdit(r); return; }
                if (!r.isUser) { alert('기본 리뷰는 관리자만 수정할 수 있습니다.'); return; }
                setPromptState({ show: true, action: 'edit', review: r, pin: '', error: '' });
            };

            const handleDeleteRequest = (r) => {
                if (isAdmin) {
                    setPromptState({ show: true, action: 'admin_delete', review: r, pin: '', error: '' });
                    return;
                }
                setPromptState({ show: true, action: 'delete', review: r, pin: '', error: '' });
            };

            const handlePromptSubmit = (e) => {
                e.preventDefault();
                const action = promptState.action;
                const review = promptState.review;

                if (action !== 'admin_delete' && promptState.pin !== review.password) {
                    setPromptState(prev => ({ ...prev, error: '비밀번호가 일치하지 않습니다.' }));
                    return;
                }

                setPromptState({ show: false, action: null, review: null, pin: '', error: '' });

                if (action === 'edit') openEdit(review);
                else handleDelete(review.id);
            };

            const maskName = (name) => {
                if (!name) return "";
                const clean = name.trim();
                if (clean.length <= 1) return clean;
                if (clean.length === 2) return clean[0] + "*";
                // 3글자 이상인 경우 가운데를 모두 별처리 (예: 홍길동 -> 홍*동, 남궁민수 -> 남**수)
                return clean[0] + "*".repeat(clean.length - 2) + clean[clean.length - 1];
            };


            return (
                <section id="reviews" className="py-16 md:py-24 bg-[#F8F9FA] relative">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <div className="flex justify-center items-center space-x-3 mb-4"><div className="w-8 h-[1px] bg-[#10b981]"></div><span className="text-[#10b981] font-bold text-xs tracking-[0.3em] uppercase">Customer Feedback</span><div className="w-8 h-[1px] bg-[#10b981]"></div></div>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-900 mb-4 tracking-tight">현장에서 증명된 <span className="text-[#065f46]">신뢰의 기록</span></h2>
                            <div className="w-16 h-1 bg-[#10b981]/30 mx-auto rounded-full mb-6"></div>
                            <p className="text-lg md:text-xl text-gray-500 font-medium break-keep opacity-80 max-w-2xl mx-auto">더 웰 서비스와 함께한 고객님들의 실제 이야기입니다.</p>
                            <div className="mt-8 flex items-center justify-center gap-2 text-[#10b981] animate-pulse">
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <span className="text-xs md:text-sm font-black tracking-wider uppercase">항목을 클릭하시면 상세한 후기 내용을 확인하실 수 있습니다.</span>
                            </div>
                        </div>

                        {/* Search/Filter/Actions Area */}
                        <div className="flex justify-between items-center mb-6">
                            <div className="text-sm font-bold text-gray-400">Total <span className="text-[#10b981]">{reviews.length}</span></div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowLookup(true)} className="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-gray-200 text-gray-400 font-black text-sm hover:border-[#10b981] hover:text-[#10b981] transition-all duration-300">
                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                    내 후기 찾기
                                </button>
                                <button onClick={openNew} className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-[#065f46] text-white font-black text-sm hover:translate-y-[-2px] shadow-sm hover:shadow-lg transition-all duration-300">
                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 4v16m8-8H4" /></svg>
                                    후기 작성하기
                                </button>
                            </div>
                        </div>

                        {/* List View */}
                        <div className="bg-white rounded-3xl shadow-[0_4px_30px_rgba(0,0,0,0.03)] border border-gray-100 overflow-hidden mb-10 overflow-x-auto">
                            <table className="w-full text-left border-collapse min-w-[600px]">
                                <thead>
                                    <tr className="bg-gray-50/50 border-b border-gray-100">
                                        <th className="px-6 py-5 text-[11px] font-black text-gray-400 uppercase tracking-widest w-24">Rating</th>
                                        <th className="px-6 py-5 text-[11px] font-black text-gray-400 uppercase tracking-widest">Subject</th>
                                        <th className="px-6 py-5 text-[11px] font-black text-gray-400 uppercase tracking-widest w-32">Author</th>
                                        <th className="px-6 py-5 text-[11px] font-black text-gray-400 uppercase tracking-widest w-32 text-center">Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {visible.length > 0 ? visible.map((r, i) => (
                                        <tr key={r.id} onClick={() => openDetail(r)} className="group border-b border-gray-50 hover:bg-[#ecfdf5]/30 cursor-pointer transition-all duration-300">
                                            <td className="px-6 py-5">
                                                <div className="flex gap-0.5 text-[#fbbf24]">
                                                    {[...Array(5)].map((_, idx) => (
                                                        <svg key={idx} className={`w-3 h-3 ${idx < (r.rating || 5) ? 'fill-current' : 'fill-gray-200'}`} viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="px-6 py-5">
                                                <div className="flex flex-col">
                                                    <span className="text-gray-900 font-bold text-sm md:text-base group-hover:text-[#065f46] transition-colors line-clamp-1 max-w-[300px] md:max-w-none">
                                                        {r.text.length > 35 ? r.text.substring(0, 35) + '...' : r.text}
                                                    </span>
                                                    <span className="text-[10px] text-gray-400 font-bold tracking-tight mt-0.5 opacity-60">{r.company || '더 웰 서비스 파트너'}</span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-5">
                                                <span className="text-gray-500 font-bold text-xs md:text-sm">{maskName(r.name)}</span>
                                            </td>
                                            <td className="px-6 py-5 text-center">
                                                <span className="text-gray-400 font-bold text-[11px]">{r.date || '2024.01.01'}</span>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="4" className="px-6 py-20 text-center text-gray-400 font-bold">등록된 후기가 없습니다.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>

                        {/* Numeric Pagination */}

                                ))}
                            </div>
                            <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page === totalPages - 1} className="w-10 h-10 rounded-xl border border-gray-200 flex items-center justify-center text-gray-400 hover:border-[#10b981] hover:text-[#10b981] disabled:opacity-20 transition-all">
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7" /></svg>
                            </button>
                        </div>
                    </div>

                    {/* Detail Modal */}
                    {selectedDetail && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[101] flex items-center justify-center p-4" onClick={closeDetail}>
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-xl overflow-hidden animate-luxury-fade" onClick={e => e.stopPropagation()}>
                                <div className="p-8 md:p-10 relative">
                                    <button onClick={closeDetail} className="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:bg-[#ecfdf5] hover:text-[#10b981] transition-all">
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" /></svg>

                                                <p className="font-black text-gray-900 leading-none mb-1">{maskName(selectedDetail.name)}</p>

                                        {(isAdmin || selectedDetail.isUser) && (

                                                <button onClick={() => handleDeleteRequest(selectedDetail)} className="px-4 py-2 rounded-xl bg-gray-50 text-gray-500 font-bold text-xs hover:bg-red-50 hover:text-red-500 transition-all">삭제</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Review Form Modal */}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[110] flex items-center justify-center p-4" onClick={(e) => e.target === e.currentTarget && closeForm()}>
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-[#10b981]"></div>
                                <button onClick={closeForm} className="absolute top-5 right-5 w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:text-gray-700 hover:bg-gray-200 transition-all">
                                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                                <div className="mb-7">
                                    <p className="text-[#10b981] font-black text-xs tracking-[0.3em] uppercase mb-2">Write Review</p>
                                    <h3 className="text-2xl font-black text-gray-900 tracking-tight">{editingId ? '후기 수정' : '후기 작성'}</h3>
                                    <p className="text-gray-400 text-sm mt-1">소중한 의견은 더 웰 서비스의 큰 자산이 됩니다.</p>
                                </div>
                                {submitted ? (
                                    <div className="text-center py-10">
                                        <div className="w-20 h-20 bg-[#ecfdf5] rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-sm">
                                            <svg className="w-10 h-10 text-[#10b981]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7" /></svg>

                                ) : (
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div className="flex flex-col items-center justify-center py-2 mb-2">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">공간 만족도 별점</label>
                                            <div className="flex gap-2">
                                                {[1, 2, 3, 4, 5].map(num => (
                                                    <button key={num} type="button" onClick={() => setForm(f => ({ ...f, rating: num }))} className={`transition-all duration-300 transform ${form.rating >= num ? 'scale-110 text-[#fbbf24]' : 'scale-100 text-gray-200'} hover:scale-125`}>
                                                        <svg className="w-8 h-8 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                    </button>
                                                ))}

                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-black text-gray-400 uppercase tracking-widest mb-1.5 block ml-1">이름 *</label>
